<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IC Studiegids — Termen &amp; Definities</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #171b26;
    --bg3: #1e2333;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0;
    --muted: #8890a8;
    --accent: #4f8ef7;
    --accent2: #6ee7b7;
    --accent3: #f472b6;
    --accent4: #fbbf24;
    --accent5: #a78bfa;
    --accent6: #f87171;
    --accent7: #34d399;
    --accent8: #38bdf8;
    --accent9: #fb923c;
    --radius: 10px;
    --radius-sm: 6px;
    --font: 'Inter', system-ui, -apple-system, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── SIDEBAR ── */
  .layout {
    display: flex;
    min-height: 100vh;
  }

  .sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-logo {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-logo .label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .sidebar-logo .title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .sidebar-logo .subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .sidebar-nav {
    padding: 12px 10px;
    flex: 1;
  }

  .nav-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 4px 10px 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    transition: all 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .nav-item:hover { background: var(--bg3); color: var(--text); }

  .nav-item.active {
    background: rgba(79,142,247,0.12);
    color: var(--accent);
    font-weight: 500;
  }

  .nav-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .nav-count {
    margin-left: auto;
    font-size: 11px;
    background: var(--bg3);
    padding: 1px 6px;
    border-radius: 20px;
    color: var(--muted);
  }

  .nav-item.active .nav-count {
    background: rgba(79,142,247,0.2);
    color: var(--accent);
  }

  .sidebar-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .search-wrap {
    flex: 1;
    max-width: 520px;
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 9px 12px 9px 36px;
    font-size: 14px;
    color: var(--text);
    font-family: var(--font);
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); }

  .clear-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 9px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .clear-btn:hover { color: var(--text); border-color: var(--border2); }

  .stats-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  .stats-count { color: var(--text); font-weight: 600; }

  /* ── CONTENT ── */
  .content {
    padding: 28px;
    flex: 1;
  }

  .chapter-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .chapter-dot-lg {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .chapter-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }

  .chapter-subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-left: auto;
  }

  /* ── TERM CARDS ── */
  .terms-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
    margin-bottom: 36px;
  }

  .term-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
    cursor: pointer;
  }

  .term-card:hover {
    border-color: var(--border2);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .term-card.open {
    border-color: var(--border2);
  }

  .term-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
  }

  .term-accent {
    width: 3px;
    height: 28px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .term-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    line-height: 1.3;
  }

  .abbr-tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--bg3);
    color: var(--muted);
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  .chevron-icon {
    color: var(--muted);
    font-size: 13px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .term-card.open .chevron-icon { transform: rotate(180deg); }

  .term-body {
    display: none;
    padding: 0 16px 16px 31px;
    font-size: 13.5px;
    color: var(--muted);
    line-height: 1.75;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    margin: 0 16px;
  }

  .term-card.open .term-body { display: block; }

  /* ── SECTION DIVIDERS ── */
  .section-block { margin-bottom: 40px; }

  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .section-label-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }

  .section-label-text {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  .section-label-count {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  /* ── NO RESULTS ── */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .no-results-icon { font-size: 40px; margin-bottom: 12px; }
  .no-results-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .no-results-sub { font-size: 13px; }

  /* ── MOBILE TOGGLE ── */
  .menu-toggle {
    display: none;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
  }

  @media (max-width: 700px) {
    .sidebar { display: none; position: fixed; z-index: 100; width: 240px; height: 100vh; top: 0; left: 0; }
    .sidebar.open { display: flex; }
    .menu-toggle { display: block; }
    .content { padding: 16px; }
    .topbar { padding: 10px 14px; }
    .terms-grid { grid-template-columns: 1fr; }
    .stats-bar { display: none; }
  }

  /* ── KEYBOARD SHORTCUT HINT ── */
  kbd {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 5px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 3px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="label">ICT · BOS · 2025–2026</div>
      <div class="title">Installatie &amp; Configuratie</div>
      <div class="subtitle">Studiegids — 80 termen</div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-label">Hoofdstukken</div>
      <button class="nav-item active" onclick="setChapter('all', this)">
        <span class="nav-dot" style="background:#8890a8"></span>
        Alle hoofdstukken
        <span class="nav-count" id="cnt-all">80</span>
      </button>
      <button class="nav-item" onclick="setChapter('H1', this)">
        <span class="nav-dot" style="background:#4f8ef7"></span>
        H1 – Assemblage
        <span class="nav-count" id="cnt-H1"></span>
      </button>
      <button class="nav-item" onclick="setChapter('H2', this)">
        <span class="nav-dot" style="background:#6ee7b7"></span>
        H2 – BIOS/UEFI
        <span class="nav-count" id="cnt-H2"></span>
      </button>
      <button class="nav-item" onclick="setChapter('H3', this)">
        <span class="nav-dot" style="background:#f472b6"></span>
        H3 – Opstartbare Media
        <span class="nav-count" id="cnt-H3"></span>
      </button>
      <button class="nav-item" onclick="setChapter('H4', this)">
        <span class="nav-dot" style="background:#fbbf24"></span>
        H4 – Installatie
        <span class="nav-count" id="cnt-H4"></span>
      </button>
      <button class="nav-item" onclick="setChapter('H5', this)">
        <span class="nav-dot" style="background:#a78bfa"></span>
        H5 – Windows Tools
        <span class="nav-count" id="cnt-H5"></span>
      </button>
      <button class="nav-item" onclick="setChapter('H6', this)">
        <span class="nav-dot" style="background:#f87171"></span>
        H6 – Terminal (CMD)
        <span class="nav-count" id="cnt-H6"></span>
      </button>
      <button class="nav-item" onclick="setChapter('H7', this)">
        <span class="nav-dot" style="background:#34d399"></span>
        H7 – Virtualisatie
        <span class="nav-count" id="cnt-H7"></span>
      </button>
      <button class="nav-item" onclick="setChapter('H8', this)">
        <span class="nav-dot" style="background:#38bdf8"></span>
        H8 – WSL
        <span class="nav-count" id="cnt-H8"></span>
      </button>
      <button class="nav-item" onclick="setChapter('H9', this)">
        <span class="nav-dot" style="background:#fb923c"></span>
        H9 – Linux
        <span class="nav-count" id="cnt-H9"></span>
      </button>
    </nav>

    <div class="sidebar-footer">
      Klik op een term om de definitie te zien.<br>
      Gebruik <kbd>/</kbd> om te zoeken.
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput"
               placeholder="Zoek termen of definities…"
               oninput="render()" autocomplete="off">
      </div>
      <button class="clear-btn" onclick="clearSearch()">Wis</button>
      <div class="stats-bar">
        <span class="stats-count" id="statsCount">80</span>
        <span>termen zichtbaar</span>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content" id="content"></div>

  </div>
</div>

<script>
const COLORS = {
  H1: '#4f8ef7', H2: '#6ee7b7', H3: '#f472b6',
  H4: '#fbbf24', H5: '#a78bfa', H6: '#f87171',
  H7: '#34d399', H8: '#38bdf8', H9: '#fb923c'
};

const CHAPTER_NAMES = {
  H1: 'H1 – Assemblage',
  H2: 'H2 – BIOS / UEFI',
  H3: 'H3 – Opstartbare Media',
  H4: 'H4 – Installatie',
  H5: 'H5 – Windows Tools',
  H6: 'H6 – Terminal (CMD)',
  H7: 'H7 – Virtualisatie',
  H8: 'H8 – WSL',
  H9: 'H9 – Linux'
};

const TERMS = [
  {ch:'H2',term:'BIOS',def:'Basic Input Output System. Firmware ingebakken in de BIOS-chip op het moederbord. Zorgt voor communicatie tussen het besturingssysteem en de hardware.'},
  {ch:'H2',term:'Firmware',def:'Software die door de fabrikant permanent in een chip wordt ingebakken, zoals de BIOS of UEFI op het moederbord.'},
  {ch:'H2',term:'POST',full:'Power-On Self-Test',def:'Controle die de BIOS uitvoert bij het opstarten om te controleren of alle hardwarecomponenten correct werken.'},
  {ch:'H2',term:'UEFI',full:'Unified Extensible Firmware Interface',def:'Opvolger van de Legacy BIOS. Nieuwere firmware met ondersteuning voor grotere schijven (GPT), snellere opstart, grafische interface en betere beveiliging.'},
  {ch:'H2',term:'GPT',full:'GUID Partition Table',def:'Partitietabel gebruikt door UEFI. Ondersteunt schijven tot zettabytes en tot 128 partities.'},
  {ch:'H2',term:'MBR',full:'Master Boot Record',def:'Oudere partitietabel voor Legacy BIOS. Ondersteunt schijven tot maximaal 2 TB.'},
  {ch:'H2',term:'Secure Boot',def:'Beveiligingsfunctie van UEFI die controleert of de opstartsoftware vertrouwd is, om te voorkomen dat malware zich tijdens het opstarten laadt.'},
  {ch:'H2',term:'TPM',full:'Trusted Platform Module',def:'Hardware-chip die sleutels bewaart en controleert of het systeem betrouwbaar opstart. Gebruikt voor BitLocker en vereist voor Windows 11.'},
  {ch:'H2',term:'Fast Boot',def:'UEFI-functie die de opstarttijd verkort door hardware efficiënter en parallel te initialiseren.'},
  {ch:'H2',term:'CMOS',def:'Chip op het moederbord die BIOS/UEFI-instellingen opslaat zoals datum, tijd, schijfconfiguratie en CPU-info. Gevoed door de CMOS-batterij.'},
  {ch:'H2',term:'CMOS-batterij',def:'Kleine batterij (CR2032) op het moederbord die de CMOS-chip van stroom voorziet zodat instellingen bewaard blijven als de computer uit staat.'},
  {ch:'H2',term:'Jumpers',def:'Kleine verbindingspinnen op het moederbord voor hardware-instellingen, o.a. om het BIOS-wachtwoord te resetten.'},
  {ch:'H2',term:'XMP / EXPO',def:'Extreme Memory Profile (Intel) / Extended Profiles for Overclocking (AMD). BIOS-profielen om RAM te overklokken naar hogere snelheden dan standaard.'},
  {ch:'H2',term:'Opstartvolgorde',def:'De volgorde van apparaten (USB, SSD, netwerk…) die de BIOS/UEFI raadpleegt om een besturingssysteem op te starten.'},
  {ch:'H2',term:'BIOS flashen',def:'Het upgraden (of downgraden) van de firmware van de BIOS/UEFI naar een nieuwe versie via een bestand op USB.'},

  {ch:'H1',term:'CPU',full:'Central Processing Unit',def:'De processor van de computer. Voert berekeningen en instructies uit. Gefabriceerd door Intel of AMD.'},
  {ch:'H1',term:'LGA',full:'Land Grid Array',def:'Sockettype van Intel waarbij de pinnen op het moederbord zitten (niet op de CPU zelf).'},
  {ch:'H1',term:'PGA',full:'Pin Grid Array',def:'Sockettype van AMD (tot AM4) waarbij de pinnen op de CPU zitten.'},
  {ch:'H1',term:'P-cores',def:'Performance Cores. Krachtige kernen in moderne Intel-processors, bedoeld voor zware taken zoals gaming en videobewerking.'},
  {ch:'H1',term:'E-cores',def:'Efficiency Cores. Zuinige kernen in moderne Intel-processors, bedoeld voor lichte achtergrondprocessen.'},
  {ch:'H1',term:'Kloksnelheid',def:'Snelheid van de CPU uitgedrukt in GHz. Geeft aan hoeveel cycli per seconde worden uitgevoerd. 1 GHz = 1000 MHz.'},
  {ch:'H1',term:'Cachegeheugen',def:'Zeer snel intern geheugen in de CPU (L1, L2, L3) dat de toegangstijd tot veelgebruikte data vermindert. L1 is het snelste en kleinste, L3 het grootste.'},
  {ch:'H1',term:'Multiplier',def:'Factor waarmee de bus speed wordt vermenigvuldigd om de CPU-kloksnelheid te berekenen. Kan gebruikt worden bij overklokken.'},
  {ch:'H1',term:'Bus speed',def:'Basiskloksnelheid van het moederbord (FSB). Vermenigvuldigd met de multiplier geeft dit de CPU-frequentie.'},
  {ch:'H1',term:'Moederbord (MoBo)',def:'Hoofdprintplaat van de computer waarop alle componenten (CPU, RAM, GPU, opslag) worden aangesloten.'},
  {ch:'H1',term:'Chipset',def:'Regelt communicatie tussen CPU, RAM, opslag en andere onderdelen. Bepaalt het aantal PCIe-lanen, USB-poorten en ondersteunde versies.'},
  {ch:'H1',term:'Vormfactor',def:'Fysieke grootte van het moederbord of de behuizing (ATX, mATX, Mini-ITX). Bepaalt compatibiliteit en uitbreidingsmogelijkheden.'},
  {ch:'H1',term:'HDD',full:'Hard Disk Drive',def:'Mechanisch opslagmedium met groot volume maar trager dan SSD. Gebruikt de SATA-interface.'},
  {ch:'H1',term:'SSD',full:'Solid State Drive',def:'Snellere flash-opslag zonder bewegende delen. Gebruikt de SATA-interface.'},
  {ch:'H1',term:'M.2 NVMe',def:'Zeer snelle SSD via PCIe-interface met lage latency. Klein formaat, direct aangesloten op het moederbord.'},
  {ch:'H1',term:'AHCI',full:'Advanced Host Controller Interface',def:'Protocol voor SATA-schijven (HDD en SSD).'},
  {ch:'H1',term:'NVMe',full:'Non-Volatile Memory Express',def:'Protocol voor M.2 NVMe-schijven via PCIe. Veel sneller dan AHCI.'},
  {ch:'H1',term:'RAID',full:'Redundant Array of Independent Disks',def:'Protocol om meerdere schijven samen te laten werken voor extra snelheid of redundantie.'},
  {ch:'H1',term:'RAM',full:'Random Access Memory',def:'Werkgeheugen van de computer. Tijdelijke opslag voor actieve processen. Wordt leeggemaakt bij uitzetten.'},
  {ch:'H1',term:'DDR',full:'Double Data Rate',def:'Generaties van RAM (DDR1 t/m DDR5). Niet onderling compatibel. Nieuwere generaties zijn sneller en hebben lagere spanning.'},
  {ch:'H1',term:'Dual / Quad Channel',def:'Geheugenconfiguratietechniek waarbij meerdere RAM-modules samenwerken om de geheugenbandbreedte te verdubbelen of verviervoudigen.'},
  {ch:'H1',term:'VRAM',full:'Video RAM',def:'Geheugen op de grafische kaart voor tijdelijke opslag van beelddata. Maakt gebruik van GDDR.'},
  {ch:'H1',term:'PSU',full:'Power Supply Unit',def:'Voeding van de computer. Converteert wisselstroom naar gelijkstroom voor de componenten. Vermogen in Watt.'},
  {ch:'H1',term:'80+ certificering',def:'Efficiëntieclassificatie van een PSU (Bronze, Gold, Platinum…). Geeft aan hoeveel opgenomen stroom effectief wordt omgezet naar bruikbare stroom.'},
  {ch:'H1',term:'ESD',full:'ElectroStatic Discharge',def:'Statische ontlading die hardware kan beschadigen. Voorkomen met antistatische mat of polsband.'},
  {ch:'H1',term:'TRIM',def:'Opdracht van het OS naar een SSD om niet meer gebruikte blokken te markeren, zodat schrijfsnelheid op peil blijft.'},
  {ch:'H1',term:'Defragmentatie',def:'Proces voor HDD waarbij versnipperde bestanden worden samengevoegd. Niet geschikt of nodig voor SSD/NVMe.'},

  {ch:'H3',term:'ISO-bestand',def:'Exacte kopie (image) van een CD of DVD, opgeslagen als één bestand met extensie .iso. Conform de ISO-9660 standaard.'},
  {ch:'H3',term:'Ventoy',def:'Tool om een USB-stick in te richten als multiboot-media. Meerdere ISO-bestanden op de USB plaatsen en opstarten.'},
  {ch:'H3',term:'Rufus',def:'Tool om een opstartbare USB te maken van één ISO-bestand. Biedt ook de mogelijkheid Windows 11-systeemvereisten te omzeilen.'},
  {ch:'H3',term:'Diskpart',def:'Windows CLI-tool om schijven en partities te beheren. Commando\'s: list disk, select disk, clean.'},
  {ch:'H3',term:'Media Creation Tool',def:'Hulpprogramma van Microsoft om een Windows ISO te downloaden of een opstartbare USB te maken.'},
  {ch:'H3',term:'Mounten',def:'Een ISO-bestand koppelen in Windows zodat het als een virtueel DVD-station verschijnt in Windows Verkenner.'},
  {ch:'H3',term:'Windows editie',def:'Variant van Windows voor specifiek gebruik: Home (thuisgebruiker), Pro, Enterprise, Education.'},
  {ch:'H3',term:'Windows versie / Build',def:'Specifieke uitgave van een Windows-editie (bv. 24H2). Versies bevatten nieuwe functies en worden via Windows Update aangeboden.'},
  {ch:'H3',term:'32-bit vs 64-bit',def:'32-bit processors kunnen max. 4 GB RAM adresseren (2³²). 64-bit processors kunnen tot 16 EB gebruiken (2⁶⁴). 64-bit kan 32-bit software draaien, niet andersom.'},

  {ch:'H4',term:'Clean install',def:'Schone Windows-installatie waarbij alle bestaande programma\'s en data worden gewist en het OS opnieuw geïnstalleerd.'},

let activeChapter = 'all';

function setChapter(ch, el) {
  activeChapter = ch;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('searchInput').value = '';
  render();
  if (window.innerWidth <= 700) document.getElementById('sidebar').classList.remove('open');
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  render();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re, '<mark style="background:rgba(79,142,247,0.25);color:inherit;border-radius:2px;padding:0 2px;">$1</mark>');
}

function render() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const content = document.getElementById('content');

  const filtered = TERMS.filter(t => {
    const matchCh = activeChapter === 'all' || t.ch === activeChapter;
    const matchQ = !q || t.term.toLowerCase().includes(q) || t.def.toLowerCase().includes(q) || (t.full && t.full.toLowerCase().includes(q));
    return matchCh && matchQ;
  });

  document.getElementById('statsCount').textContent = filtered.length;

  if (filtered.length === 0) {
    content.innerHTML = `<div class="no-results">
      <div class="no-results-icon">🔍</div>
      <div class="no-results-title">Geen termen gevonden</div>
      <div class="no-results-sub">Probeer een andere zoekterm of selecteer een ander hoofdstuk.</div>
    </div>`;
    return;
  }

  if (activeChapter !== 'all' || q) {
    const color = activeChapter !== 'all' ? COLORS[activeChapter] : '#8890a8';
    const label = activeChapter !== 'all' ? CHAPTER_NAMES[activeChapter] : 'Zoekresultaten';
    content.innerHTML = `
      <div class="section-label">
        <span class="section-label-dot" style="background:${color}"></span>
        <span class="section-label-text">${label}</span>
        <span class="section-label-count">${filtered.length} term${filtered.length!==1?'en':''}</span>
      </div>
      <div class="terms-grid">${filtered.map(t => cardHTML(t, q)).join('')}</div>`;
  } else {
    const chapters = ['H1','H2','H3','H4','H5','H6','H7','H8','H9'];
    content.innerHTML = chapters.map(ch => {
      const terms = filtered.filter(t => t.ch === ch);
      if (!terms.length) return '';
      return `<div class="section-block">
        <div class="section-label">
          <span class="section-label-dot" style="background:${COLORS[ch]}"></span>
          <span class="section-label-text">${CHAPTER_NAMES[ch]}</span>
          <span class="section-label-count">${terms.length} termen</span>
        </div>
        <div class="terms-grid">${terms.map(t => cardHTML(t, q)).join('')}</div>
      </div>`;
    }).join('');
  }

  updateCounts();
}

function cardHTML(t, q) {
  const color = COLORS[t.ch];
  return `<div class="term-card" onclick="this.classList.toggle('open')">
    <div class="term-header">
      <span class="term-accent" style="background:${color}"></span>
      <span class="term-name">${highlight(t.term, q)}</span>
      ${t.full ? `<span class="abbr-tag">${highlight(t.full,q)}</span>` : ''}
      <span class="chevron-icon">▾</span>
    </div>
    <div class="term-body">${highlight(t.def, q)}</div>
  </div>`;
}

function updateCounts() {
  const chapters = ['H1','H2','H3','H4','H5','H6','H7','H8','H9'];
  const all_count = TERMS.length;
  document.getElementById('cnt-all').textContent = all_count;
  chapters.forEach(ch => {
    const el = document.getElementById('cnt-' + ch);
    if (el) el.textContent = TERMS.filter(t => t.ch === ch).length;
  });
}

document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== document.getElementById('searchInput')) {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('searchInput').blur();
    document.getElementById('sidebar').classList.remove('open');
  }
});

render();
</script>
