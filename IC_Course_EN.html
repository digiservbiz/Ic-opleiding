<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IC Course — Installation & Configuration</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
:root{
  --bg:#090d18;--bg2:#0f1522;--bg3:#161e30;--bg4:#1d2640;--bg5:#243050;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);--border3:rgba(255,255,255,0.2);
  --text:#e2e8f4;--dim:#8892a8;--muted:#4a5468;
  --blue:#58a6ff;--green:#3fb950;--red:#f87171;--amber:#fbbf24;--purple:#c084fc;--pink:#f472b6;--sky:#38bdf8;--orange:#fb923c;--teal:#2dd4bf;
  --mono:'Space Mono',monospace;--sans:'Space Grotesk',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── LAYOUT ── */
.layout{display:flex;min-height:100vh;}
.sidebar{width:280px;min-width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.main-area{flex:1;min-width:0;display:flex;flex-direction:column;}

/* ── SIDEBAR ── */
.sidebar-head{padding:20px 18px 14px;border-bottom:1px solid var(--border);}
.sidebar-logo{font-size:11px;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.sidebar-title{font-size:16px;font-weight:700;letter-spacing:-.02em;}
.sidebar-title span{color:var(--blue);}
.sidebar-progress{margin-top:10px;}
.prog-bar-wrap{height:4px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-bottom:5px;}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal));border-radius:4px;transition:width .5s ease;}
.prog-text{font-size:10px;color:var(--muted);font-family:var(--mono);}

.sidebar-nav{padding:10px 8px;flex:1;}
.nav-section{margin-bottom:4px;}
.nav-ch{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  border-radius:8px;cursor:pointer;transition:all .15s;
  border:none;background:none;width:100%;text-align:left;color:var(--dim);
}
.nav-ch:hover{background:var(--bg3);color:var(--text);}
.nav-ch.active{background:rgba(88,166,255,.1);color:var(--blue);}
.nav-ch.completed{color:var(--green);}
.nav-ch-icon{font-size:14px;flex-shrink:0;}
.nav-ch-info{flex:1;min-width:0;}
.nav-ch-label{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:.06em;}
.nav-ch-name{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-ch-check{font-size:12px;flex-shrink:0;}

.nav-lessons{padding-left:32px;margin-bottom:4px;display:none;}
.nav-ch.active~.nav-lessons,.nav-ch.completed~.nav-lessons{display:block;}
.nav-lesson-btn{
  display:flex;align-items:center;gap:6px;width:100%;padding:5px 8px;
  border-radius:6px;border:none;background:none;font-family:var(--sans);
  font-size:11.5px;color:var(--muted);cursor:pointer;transition:all .15s;text-align:left;
}
.nav-lesson-btn:hover{background:var(--bg3);color:var(--text);}
.nav-lesson-btn.active{color:var(--blue);font-weight:500;}
.nav-lesson-btn.done{color:var(--green);}
.lesson-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .15s;}
.nav-lesson-btn.active .lesson-dot{background:var(--blue);}
.nav-lesson-btn.done .lesson-dot{background:var(--green);}

.sidebar-foot{padding:14px 18px;border-top:1px solid var(--border);}
.xp-badge{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--amber);}
.xp-val{font-family:var(--mono);font-weight:700;font-size:14px;}

/* ── TOPBAR ── */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:30;}
.breadcrumb{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.breadcrumb span{color:var(--text);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.lesson-counter{font-family:var(--mono);font-size:11px;color:var(--muted);}
.menu-btn{display:none;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:16px;}

/* ── CONTENT ── */
.content{flex:1;padding:40px 48px;max-width:820px;}
.lesson-hero{margin-bottom:36px;}
.lesson-tag{font-size:10px;font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.lesson-title{font-size:clamp(22px,4vw,36px);font-weight:700;letter-spacing:-.02em;line-height:1.2;margin-bottom:10px;}
.lesson-intro{font-size:15px;color:var(--dim);line-height:1.75;max-width:640px;}

/* ── LESSON BLOCKS ── */
.lesson-block{margin-bottom:32px;}
.block-title{font-size:13px;font-weight:700;letter-spacing:-.01em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.block-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* info card */
.info-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:10px;line-height:1.75;font-size:14px;color:var(--dim);}
.info-card strong{color:var(--text);font-weight:600;}
.info-card .accent{color:var(--blue);}

/* highlight box */
.hbox{border-radius:8px;padding:14px 16px;margin-bottom:10px;font-size:13.5px;line-height:1.7;display:flex;gap:10px;}
.hbox-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.hbox-content{flex:1;}
.hbox-content strong{display:block;font-weight:600;margin-bottom:2px;}
.hbox.blue{background:rgba(88,166,255,.07);border:1px solid rgba(88,166,255,.2);color:#93c5fd;}
.hbox.green{background:rgba(63,185,80,.07);border:1px solid rgba(63,185,80,.2);color:#86efac;}
.hbox.red{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.2);color:#fca5a5;}
.hbox.amber{background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.2);color:#fde68a;}
.hbox.purple{background:rgba(192,132,252,.07);border:1px solid rgba(192,132,252,.2);color:#d8b4fe;}

/* code block */
.code-block{background:#0d1117;border:1px solid var(--border2);border-radius:10px;overflow:hidden;margin-bottom:10px;}
.code-header{background:var(--bg3);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;}
.code-lang{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
.copy-code-btn{font-family:var(--mono);font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;transition:color .15s;padding:0;}
.copy-code-btn:hover{color:var(--blue);}
.code-body{padding:16px;font-family:var(--mono);font-size:13px;line-height:1.8;overflow-x:auto;color:#e6edf3;}
.code-body .cmd{color:var(--sky);}
.code-body .param{color:var(--orange);}
.code-body .comment{color:var(--muted);}
.code-body .path{color:var(--green);}
.code-body .val{color:var(--amber);}
.code-body .kw{color:var(--purple);}

/* comparison table */
.comp-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:10px;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
.comp-table th{background:var(--bg3);padding:9px 12px;text-align:left;font-size:10px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border2);}
.comp-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--dim);vertical-align:top;line-height:1.55;}
.comp-table tr:last-child td{border-bottom:none;}
.comp-table tr:hover td{background:rgba(255,255,255,.02);color:var(--text);}
.comp-table td:first-child{font-weight:600;color:var(--text);font-family:var(--mono);font-size:12px;white-space:nowrap;}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;font-family:var(--mono);}
.badge-green{background:rgba(63,185,80,.15);color:var(--green);}
.badge-red{background:rgba(248,113,113,.15);color:var(--red);}
.badge-amber{background:rgba(251,191,36,.15);color:var(--amber);}
.badge-blue{background:rgba(88,166,255,.15);color:var(--blue);}

/* diagram */
.diagram{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:10px;font-family:var(--mono);font-size:12px;color:var(--dim);line-height:1.8;overflow-x:auto;}
.diagram .box{display:inline-block;border:1px solid var(--border2);border-radius:5px;padding:4px 10px;color:var(--text);font-size:11px;margin:2px;}
.diagram .arrow{color:var(--muted);}
.diagram .layer{padding:8px 12px;border-radius:6px;margin:4px 0;text-align:center;}
.layer-hw{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);}
.layer-hv{background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.2);}
.layer-vm{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.2);}

/* step list */
.steps{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.step{display:flex;gap:12px;align-items:flex-start;}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px;color:var(--blue);}
.step-content{flex:1;font-size:13.5px;color:var(--dim);line-height:1.6;padding-top:1px;}
.step-content strong{color:var(--text);}
.step-content code{font-family:var(--mono);font-size:11.5px;background:var(--bg);color:var(--blue);padding:1px 5px;border-radius:4px;border:1px solid var(--border2);}

/* key-value pills */
.kv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:10px;}
.kv-pill{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.kv-key{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;}
.kv-val{font-size:13px;font-weight:600;color:var(--text);}
.kv-sub{font-size:11px;color:var(--dim);margin-top:2px;}

/* ── MINI QUIZ ── */
.mini-quiz{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:24px;}
.quiz-header{background:var(--bg3);padding:12px 18px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.quiz-header-icon{font-size:16px;}
.quiz-header-title{font-size:12px;font-weight:600;color:var(--dim);}
.quiz-body{padding:18px;}
.quiz-q{font-size:14px;font-weight:500;margin-bottom:14px;line-height:1.5;}
.quiz-opts{display:flex;flex-direction:column;gap:7px;}
.quiz-opt{
  padding:10px 14px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg3);cursor:pointer;font-size:13px;color:var(--dim);
  transition:all .15s;text-align:left;font-family:var(--sans);display:flex;gap:8px;align-items:flex-start;
}
.quiz-opt:hover:not(.disabled){border-color:var(--blue);color:var(--text);background:rgba(88,166,255,.07);}
.quiz-opt.correct{border-color:var(--green);background:rgba(63,185,80,.08);color:#86efac;}
.quiz-opt.wrong{border-color:var(--red);background:rgba(248,113,113,.08);color:#fca5a5;}
.quiz-opt.disabled{cursor:default;}
.quiz-exp{margin-top:12px;padding:12px 14px;border-radius:8px;font-size:12.5px;line-height:1.65;display:none;}
.quiz-exp.show{display:block;}
.quiz-exp.ok{background:rgba(63,185,80,.07);border:1px solid rgba(63,185,80,.2);color:#86efac;}
.quiz-exp.bad{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.2);color:#fca5a5;}

/* ── LESSON FOOTER ── */
.lesson-footer{padding:28px 48px;border-top:1px solid var(--border);display:flex;gap:12px;align-items:center;}
.mark-done-btn{background:var(--green);color:#fff;border:none;padding:11px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:opacity .15s;}
.mark-done-btn:hover{opacity:.88;}
.mark-done-btn:disabled{background:var(--bg4);color:var(--muted);cursor:default;opacity:1;}
.nav-prev-btn,.nav-next-btn{background:var(--bg3);color:var(--text);border:1px solid var(--border2);padding:11px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .15s;}
.nav-prev-btn:hover,.nav-next-btn:hover{background:var(--bg4);}
.lesson-footer-right{margin-left:auto;display:flex;gap:10px;}

/* ── HOME SCREEN ── */
.home-screen{padding:48px;max-width:900px;}
.home-hero{margin-bottom:40px;}
.home-eyebrow{font-size:10px;font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.home-title{font-size:clamp(28px,5vw,48px);font-weight:700;letter-spacing:-.03em;line-height:1.1;margin-bottom:12px;}
.home-title span{color:var(--blue);}
.home-sub{font-size:15px;color:var(--dim);line-height:1.7;max-width:560px;margin-bottom:24px;}
.home-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px;}
.home-stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;min-width:100px;}
.home-stat-val{font-size:22px;font-weight:700;font-family:var(--mono);}
.home-stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;}
.home-stat.blue .home-stat-val{color:var(--blue);}
.home-stat.green .home-stat-val{color:var(--green);}
.home-stat.amber .home-stat-val{color:var(--amber);}
.home-stat.purple .home-stat-val{color:var(--purple);}
.ch-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.ch-card-home{
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.ch-card-home::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:10px 10px 0 0;opacity:0;transition:opacity .2s;}
.ch-card-home:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.ch-card-home:hover::before{opacity:1;}
.ch-num-home{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.ch-icon-home{font-size:24px;margin-bottom:8px;}
.ch-name-home{font-size:14px;font-weight:700;margin-bottom:4px;}
.ch-meta-home{font-size:11px;color:var(--muted);margin-bottom:10px;}
.ch-prog-home{height:3px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.ch-prog-fill-home{height:100%;border-radius:3px;transition:width .5s ease;}
.start-course-btn{background:var(--blue);color:#fff;border:none;padding:14px 28px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:opacity .15s;margin-bottom:32px;}
.start-course-btn:hover{opacity:.88;}

/* ── COMPLETE SCREEN ── */
.complete-screen{display:flex;align-items:center;justify-content:center;flex:1;padding:40px;}
.complete-inner{text-align:center;max-width:500px;}
.complete-icon{font-size:64px;margin-bottom:20px;}
.complete-title{font-size:28px;font-weight:700;margin-bottom:8px;}
.complete-msg{font-size:14px;color:var(--dim);margin-bottom:24px;line-height:1.7;}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{display:none;position:fixed;z-index:100;height:100vh;top:0;left:0;width:280px;}
  .sidebar.open{display:flex;}
  .menu-btn{display:block;}
  .content{padding:24px 20px;}
  .lesson-footer{padding:20px;}
  .home-screen{padding:24px;}
}
.hidden{display:none!important;}
</style>
</head>
<body>
<div class="layout">

<!-- ── SIDEBAR ── -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <div class="sidebar-logo">ICT · OS &amp; Networks</div>
    <div class="sidebar-title">IC <span>Course</span></div>
    <div class="sidebar-progress">
      <div class="prog-bar-wrap"><div class="prog-bar-fill" id="sidebarProgBar" style="width:0%"></div></div>
      <div class="prog-text" id="sidebarProgText">0 / 0 lessons completed</div>
    </div>
  </div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-foot">
    <div class="xp-badge">⚡ <span class="xp-val" id="xpVal">0</span> XP earned</div>
  </div>
</aside>

<!-- ── MAIN ── -->
<div class="main-area">
  <div class="topbar">
    <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
    <div class="breadcrumb" id="breadcrumb"><span>Course Home</span></div>
    <div class="topbar-right">
      <div class="lesson-counter" id="lessonCounter"></div>
    </div>
  </div>

  <!-- content area -->
  <div style="flex:1;overflow-y:auto;" id="mainScroll">
    <div id="pageContent" style="display:flex;flex-direction:column;min-height:calc(100vh - 52px);"></div>
  </div>
</div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
//  COURSE DATA — 9 chapters, multiple lessons each
// ══════════════════════════════════════════════════════════════════
const COURSE = [
{
  id:'ch1', icon:'🔩', color:'#58a6ff', label:'Chapter 1',
  title:'Computer Assembly',
  lessons:[
    {
      id:'ch1-l1', title:'Hardware Components Overview',
      tag:'Chapter 1 · Lesson 1',
      intro:'A computer is built from several key components, each with a specific role. Before assembling anything, you need to understand what each part does and how they connect to each other.',
      blocks:[
        {type:'kv', title:'The Main Components',
         items:[
           {key:'CPU',val:'Central Processing Unit',sub:'The brain — executes all instructions'},
           {key:'MoBo',val:'Motherboard',sub:'The spine — connects everything'},
           {key:'RAM',val:'Random Access Memory',sub:'Working memory — cleared on shutdown'},
           {key:'GPU',val:'Graphics Card',sub:'Renders images and video output'},
           {key:'PSU',val:'Power Supply Unit',sub:'Converts AC mains to DC power'},
           {key:'Storage',val:'HDD / SSD / NVMe',sub:'Persistent data storage'},
         ]
        },
        {type:'hbox', style:'blue', icon:'💡', title:'Key insight',
         text:'Every component plugs into or communicates through the <strong>motherboard</strong>. The motherboard\'s chipset determines which CPU, RAM generation, and PCIe version you can use.'},
        {type:'hbox', style:'amber', icon:'⚠️', title:'Safety first — always!',
         text:'Before touching any component, use an <strong>anti-static mat or wrist strap</strong>. ElectroStatic Discharge (ESD) can permanently destroy chips without any visible damage.'},
      ],
      quiz:{q:'Which component acts as the main circuit board that connects all other parts?',opts:['CPU','RAM','Motherboard','PSU'],ans:2,exp:'The Motherboard (MoBo) is the main circuit board. All components — CPU, RAM, GPU, storage — plug into or communicate through it.'}
    },
    {
      id:'ch1-l2', title:'CPU Deep Dive',
      tag:'Chapter 1 · Lesson 2',
      intro:'The CPU is the most critical component for performance. Understanding how it works — clock speed, cores, cache, and naming conventions — helps you choose the right processor.',
      blocks:[
        {type:'info', title:'How CPU Speed is Calculated',
         text:'The CPU runs at a frequency determined by a simple formula:\n<strong>CPU Frequency = Multiplier × Bus Speed</strong>\n\nExample: Multiplier 27 × Bus Speed 100 MHz = <span class="accent">2700 MHz (2.7 GHz)</span>.\n\nThe <strong>multiplier</strong> can be adjusted when overclocking (K-suffix Intel CPUs or AMD Ryzen X-suffix). The Bus Speed is set by the motherboard and chipset.'},
        {type:'table', title:'CPU Cache Levels',
         headers:['Level','Speed','Size','Scope'],
         rows:[
           ['L1 Cache','Fastest','32–64 KB per core','Per core (each core has its own)'],
           ['L2 Cache','Fast','256 KB–4 MB per core','Per core (each core has its own)'],
           ['L3 Cache','Slower','4–64 MB shared','Shared across ALL cores'],
         ]
        },
        {type:'hbox', style:'blue', icon:'🔍', title:'Intel CPU naming: i7-8550U',
         text:'<strong>i7</strong> = model tier | <strong>8</strong> = 8th generation | <strong>550</strong> = SKU (higher = better) | <strong>U</strong> = ultra-low power suffix<br><br>Common suffixes: U (ultra-low power), K (unlocked/overclockable), H (high performance mobile), F (no integrated GPU)'},
        {type:'hbox', style:'purple', icon:'🔍', title:'AMD CPU naming: Ryzen 5 5600X',
         text:'<strong>Ryzen 5</strong> = model tier | <strong>5</strong> = generation | <strong>600</strong> = SKU | <strong>X</strong> = high performance<br><br>Common suffixes: X (performance), G (integrated Radeon GPU), T (low power)'},
        {type:'kv', title:'P-cores vs E-cores (Intel hybrid)',
         items:[
           {key:'P-cores',val:'Performance Cores',sub:'Heavy tasks: gaming, video editing, compiling'},
           {key:'E-cores',val:'Efficiency Cores',sub:'Background tasks: antivirus, system updates'},
         ]

{
  id:'ch2', icon:'⚙️', color:'#3fb950', label:'Chapter 2',
  title:'BIOS / UEFI',
  lessons:[
    {
      id:'ch2-l1', title:'BIOS vs UEFI',
      tag:'Chapter 2 · Lesson 1',
      intro:'Every computer needs firmware — software embedded on the motherboard that starts the system before the OS loads. BIOS is the old standard; UEFI is the modern replacement with significant improvements.',
      blocks:[
        {type:'table', title:'BIOS vs UEFI — Side by Side',
         headers:['Feature','Legacy BIOS','UEFI'],
         rows:[
           ['Interface','Text-only, keyboard only','GUI with mouse support'],
           ['Partition table','MBR (max 2 TB)','GPT (unlimited)'],
           ['Max partitions','4 primary','128 partitions'],
           ['Boot speed','Slow (sequential)','Fast (parallel)'],
           ['Secure Boot','❌ Not available','✅ Supported'],
           ['TPM support','❌ Limited','✅ Full support'],
           ['Drive size','~2 TB maximum','Zettabytes'],
           ['Windows 11','❌ Not supported','✅ Required'],
         ]
        },
        {type:'hbox', style:'blue', icon:'💡', title:'What is POST?',
         text:'<strong>POST</strong> (Power-On Self-Test) runs every time you start your computer. The BIOS checks CPU, RAM, storage and other hardware. If it finds a problem, it signals via <strong>beep codes</strong> — different patterns of beeps indicate different hardware failures.'},
        {type:'hbox', style:'green', icon:'🔑', title:'How to enter BIOS/UEFI',
         text:'Common keys at startup: <strong>Del</strong>, <strong>F2</strong>, or <strong>F10</strong> (varies by manufacturer).<br><br>To access Boot Menu: <strong>F8</strong>, <strong>F11</strong>, or <strong>F12</strong>.<br><br>⚠️ If Fast Boot is on: do a <strong>full shutdown</strong> first (not restart), then power on and press the key.'},
      ],
      quiz:{q:'Which partition table is used by UEFI?',opts:['MBR','FAT32','GPT','NTFS'],ans:2,exp:'UEFI uses GPT (GUID Partition Table) which supports drives of any size and up to 128 partitions. Legacy BIOS used MBR, which was limited to ~2 TB and 4 primary partitions.'}
    },
    {
      id:'ch2-l2', title:'Secure Boot & TPM',
      tag:'Chapter 2 · Lesson 2',
      intro:'Secure Boot and TPM are two security features that Windows 11 requires. Understanding what they do — and the difference between them — is essential for both installation and exam.',
      blocks:[
        {type:'hbox', style:'green', icon:'🛡️', title:'Secure Boot',
         text:'<strong>Secure Boot</strong> is a UEFI feature that checks the digital signature of every piece of software that loads at startup. If the signature is not trusted, the software is blocked.<br><br>Purpose: prevent malware (rootkits, bootkits) from loading before Windows starts.\n\nWhere to find it: UEFI → Security or Boot tab → Secure Boot: <strong>Enabled</strong>'},
        {type:'hbox', style:'blue', icon:'🔐', title:'TPM (Trusted Platform Module)',
         text:'<strong>TPM</strong> is a hardware chip that stores cryptographic keys. It\'s used to:<br>• Verify that the system boots in a trusted state<br>• Power <strong>BitLocker</strong> drive encryption<br>• Required for <strong>Windows 11</strong> (version 2.0)\n\nWhere to find it: UEFI → Security or Advanced tab → TPM or PTT (Intel) / fTPM (AMD)'},
        {type:'hbox', style:'red', icon:'❌', title:'Common misconception',
         text:'<strong>Secure Boot ≠ drive encryption.</strong> Secure Boot only checks what boots. Drive encryption is done by <strong>BitLocker</strong>, which uses the <strong>TPM</strong> to store its keys.'},
        {type:'table', title:'Secure Boot vs TPM — Clear Difference',
         headers:['Feature','Secure Boot','TPM'],
         rows:[
           ['Type','UEFI software feature','Physical hardware chip'],
           ['What it does','Checks signatures at boot','Stores encryption keys'],
           ['Prevents','Untrusted software at startup','Disk tampering, key theft'],
           ['Used by','Windows startup process','BitLocker, Windows 11'],
           ['Windows 11 required?','✅ Yes','✅ Yes (v2.0)'],
         ]
        },
      ],
      quiz:{q:'What does Secure Boot actually do?',opts:['Encrypts the hard drive','Verifies digital signatures of startup software','Speeds up the boot process','Stores cryptographic keys'],ans:1,exp:'Secure Boot verifies the digital signatures of startup software. It blocks any unsigned or untrusted code from loading at startup — preventing bootkits and rootkits.'}
    },
    {
      id:'ch2-l3', title:'CMOS, Jumpers & BIOS Flashing',
      tag:'Chapter 2 · Lesson 3',
      intro:'Beyond Secure Boot and TPM, there are three more BIOS concepts you must understand: the CMOS chip that stores settings, jumpers that reset them, and flashing which updates the firmware.',
      blocks:[
        {type:'hbox', style:'blue', icon:'🔋', title:'CMOS Chip & Battery',
         text:'The <strong>CMOS chip</strong> stores BIOS settings (date, time, boot order, hardware config) even when the PC is powered off. It\'s kept alive by a <strong>CR2032 coin cell battery</strong> on the motherboard.\n\nWhen the battery dies: date/time resets, boot order may reset, but <strong>passwords are NOT cleared</strong>.'},
        {type:'hbox', style:'amber', icon:'⚠️', title:'Jumpers — to clear BIOS password',
         text:'<strong>Jumpers</strong> are small pins on the motherboard. Moving a jumper to the RESET position (and back) clears the BIOS password.\n\n🚨 Removing the CMOS battery does NOT clear the password. You must use the CMOS jumper for that.'},
        {type:'hbox', style:'red', icon:'🔥', title:'BIOS Flashing — Critical Warning',
         text:'<strong>Flashing</strong> = writing new firmware to the BIOS chip. Steps:<br>1. Download the correct firmware from the manufacturer website<br>2. Copy to USB drive<br>3. Use the BIOS\'s built-in flash tool (usually under Tools or Advanced)<br><br><strong>⚠️ NEVER power off the computer during flashing. It will permanently damage the motherboard.</strong>'},
        {type:'kv', title:'XMP & EXPO — RAM Overclocking Profiles',
         items:[
           {key:'XMP',val:'Intel platform',sub:'eXtreme Memory Profile — runs RAM at rated speed'},
           {key:'EXPO',val:'AMD platform',sub:'Extended Profiles for OC — AMD equivalent of XMP'},
         ]
        },
      ],
      quiz:{q:'You remove the CMOS battery on a motherboard. What happens to the BIOS password?',opts:['Password is cleared','Password stays — use jumpers to clear it','Password resets to "admin"','Password cannot be cleared'],ans:1,exp:'Removing the CMOS battery resets date/time and some settings but does NOT clear the BIOS password. To clear the password, you must use the CMOS RESET jumper on the motherboard.'}
    },
  ]
},

    {
      id:'ch6-l3', title:'Batch Files (.BAT)',

      intro:'A batch file is a script that automates a sequence of CMD commands. They\'re used to automate repetitive tasks, set up folder structures, and deploy configurations.',
      blocks:[
        {type:'hbox', style:'blue', icon:'📄', title:'What is a batch file?',
         text:'A batch file has the <strong>.bat</strong> extension and contains CMD commands executed one by one automatically. Create them in Notepad or Notepad++. Run by double-clicking or from CMD.'},
        {type:'code', lang:'Example batch file — setup.bat',
         lines:[
           {type:'kw', text:'@echo off'},
           {type:'comment', text:'REM This script creates a folder structure'},

           {type:'cmd', text:'mkdir C:\\CBS\\Win11\\Pro'},
           {type:'cmd', text:'mkdir C:\\CBS\\Linux'},

           ['REM [text]','Add a comment (not executed)',':REM This is a note'],

           ['IF','Conditional logic','IF EXIST file.txt del file.txt'],

      quiz:{q:'What does "@echo off" at the top of a batch file do?',opts:['Deletes all echo commands','Hides the CMD prompt and command text from the output','Disables all commands in the script','Runs the script silently in the background'],ans:1,exp:'@echo off hides the working directory and each command from being displayed as it runs, making the output cleaner. The @ symbol also hides the "echo off" command itself from appearing.'}

{
  id:'ch7', icon:'🖥️', color:'#79c0ff', label:'Chapter 7',
  title:'Virtualisation',
  lessons:[
    {
      id:'ch7-l1', title:'Why Virtualisation?',
      tag:'Chapter 7 · Lesson 1',
      intro:'Virtualisation solves a fundamental problem in IT: physical servers are expensive, power-hungry, and underutilised. By running multiple virtual machines on one physical host, you dramatically improve efficiency.',
      blocks:[
        {type:'hbox', style:'amber', icon:'🔍', title:'The problem with traditional architecture',
         text:'Imagine 3 servers, each running one application:\n• Webserver 1: uses 20% of resources\n• Webserver 2: uses 30% of resources\n• Webserver 3: uses 40% of resources\n\nResult: 3 expensive machines, each wasting 60–80% of their capacity.'},
        {type:'hbox', style:'green', icon:'✅', title:'The virtualisation solution',
         text:'One powerful physical server runs a <strong>hypervisor</strong> that creates 3 (or more) virtual machines. Each VM gets exactly the resources it needs. Total resource use: ~90% instead of three machines at 20–40%.'},
        {type:'table', title:'Benefits of Virtualisation',
         headers:['Benefit','Details'],
         rows:[
           ['Cost savings','Fewer physical servers = lower hardware + energy costs'],
           ['Efficient resources','One machine runs multiple isolated environments'],
           ['Easy management','VMs can be cloned, moved, snapshotted, and migrated'],
           ['Testing & development','Safely test in an isolated VM without risk to production'],
           ['Multiple OS types','Run Windows, Linux, and others on the same hardware'],
           ['Disaster recovery','Snapshots and backups are much faster with VMs'],
         ]
        },
      ],
      quiz:{q:'What is the main resource efficiency benefit of virtualisation?',opts:['It makes CPUs faster','Multiple VMs share one physical machine, reducing waste','It removes the need for RAM','VMs run faster than physical machines'],ans:1,exp:'Virtualisation allows multiple virtual machines to share one physical machine. Instead of several physical servers each using 20-40% of their resources, one server can run all of them efficiently — dramatically reducing waste.'}
    },
    {
      id:'ch7-l2', title:'Hypervisor Types',
      tag:'Chapter 7 · Lesson 2',
      intro:'The hypervisor is the software that makes virtualisation possible. There are two types, with very different architectures — and the exam always tests this.',
      blocks:[

<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">

    <div class="layer layer-vm">VM 1 (Guest OS)</div>
    <div class="layer layer-vm">VM 2 (Guest OS)</div>

</div>`
        },

         rows:[

           ['Host OS needed?','❌ No','✅ Yes'],
           ['Performance','Better (direct hardware access)','Slightly lower overhead'],
           ['Use case','Enterprise, data centres, servers','Personal PC, learning, testing'],
           ['Examples','Hyper-V, VMware ESXi, Proxmox','VirtualBox, VMware Workstation'],
         ]
        },
        {type:'hbox', style:'amber', icon:'⚠️', title:'Prerequisite: Enable virtualisation in BIOS',
         text:'Before Hyper-V can work, CPU virtualisation must be enabled in BIOS/UEFI.\n• <strong>Intel:</strong> Intel Virtualization Technology (VT-x)\n• <strong>AMD:</strong> AMD Virtualization (AMD-V)\n\nIf "Hyper-V Platform" is greyed out in Windows Features → this is why.'},

    },
    {
      id:'ch7-l3', title:'Hyper-V: Creating VMs',
      tag:'Chapter 7 · Lesson 3',
      intro:'Microsoft Hyper-V is a Type 1 hypervisor built into Windows. This lesson walks through everything needed to set up and configure a Windows 11 virtual machine.',
      blocks:[
        {type:'steps', title:'Installing & Configuring Hyper-V',
         steps:[
           {text:'Enable in Windows Features: search "Turn Windows features on or off" → tick <strong>Hyper-V</strong> → restart'},
           {text:'Open <strong>Hyper-V Manager</strong> → Action menu → New → Virtual Machine'},
           {text:'Name: <code>IC_Firstname</code> | Keep default location → Next'},
           {text:'Generation: choose <strong>Generation 2</strong> (UEFI — required for Windows 11)'},
           {text:'RAM: set <strong>4096 MB</strong> minimum | leave Dynamic Memory <strong>OFF</strong> for now'},
           {text:'Network: leave on <strong>Not Connected</strong> for now (configure later)'},
           {text:'VHDX: create new virtual hard disk — <strong>70 GB</strong> minimum for Windows 11'},
           {text:'Installation options: browse to your <strong>Windows 11 ISO</strong> file'},
           {text:'Review summary → Finish'},
           {text:'Before starting: go to VM Settings → Security → enable <strong>TPM</strong>'},
         ]
        },
        {type:'hbox', style:'blue', icon:'💡', title:'Generation 1 vs Generation 2',
         text:'<strong>Generation 1 = Legacy BIOS (MBR)</strong> — for older operating systems<br><strong>Generation 2 = UEFI (GPT)</strong> — required for Windows 11 and modern Linux\n\nAlways choose Generation 2 for Windows 11. You cannot change generation after creation.'},
        {type:'hbox', style:'green', icon:'📁', title:'VHDX location',
         text:'The VHDX file (virtual hard disk) is stored on your host at:\n<code>C:\\ProgramData\\Microsoft\\Windows\\Virtual Hard Disks\\</code>\n\nThis is a regular file — you can copy, move, or delete it to manage VMs.'},
      ],
      quiz:{q:'Why must you choose Generation 2 when creating a Hyper-V VM for Windows 11?',opts:['Generation 2 uses less RAM','Generation 2 uses UEFI/GPT, which Windows 11 requires','Generation 2 is faster for gaming','Generation 2 has better graphics support'],ans:1,exp:'Generation 2 VMs use UEFI (with GPT) which is a system requirement for Windows 11. Generation 1 uses Legacy BIOS (MBR) which is incompatible with Windows 11. You also need to enable TPM in the VM security settings.'}
    },
    {
      id:'ch7-l4', title:'Hyper-V: Virtual Switches',
      tag:'Chapter 7 · Lesson 4',
      intro:'Virtual switches control how VMs communicate — with each other, with the host, and with the internet. This is one of the most tested topics in the exam.',
      blocks:[
        {type:'table', title:'Virtual Switch Types — Memorise This',
         headers:['Switch','VM ↔ VM','VM ↔ Host','VM ↔ Internet','Key rule'],
         rows:[
           ['Private','✅ Same switch','❌','❌','Most isolated — VMs only'],
           ['Internal','✅ Same switch','✅','❌','VM + Host, no internet'],
           ['External','✅','✅','✅','Full access via host NIC (bridged)'],
           ['Default','✅','✅','✅','Auto-created — avoid in exercises'],
         ]
        },
        {type:'hbox', style:'red', icon:'🚨', title:'External Switch WARNING — TCP/IPv4',
         text:'When you create an External Switch, the host\'s NIC is <strong>bridged</strong>. TCP/IPv4 automatically moves from the physical NIC to the virtual switch.\n\n<strong>NEVER</strong> manually re-enable TCP/IPv4 on the physical NIC! This gives the PC two IP addresses and breaks the network.\n\nThe External Switch manages the NIC — leave the physical NIC alone.'},
        {type:'hbox', style:'amber', icon:'💡', title:'Checkpoints',
         text:'A <strong>checkpoint</strong> is a snapshot of a VM\'s complete state at a point in time — memory, disk, settings.\n\nCreate before risky changes. Restore to roll back. In Hyper-V Manager → right-click VM → Checkpoint.\n\n⚠️ Checkpoints are NOT a substitute for proper backups.'},
        {type:'steps', title:'Creating Virtual Switches',
         steps:[
           {text:'Open Hyper-V Manager → Action menu → <strong>Virtual Switch Manager</strong>'},
           {text:'Select type: External, Internal, or Private → Create Virtual Switch'},
           {text:'<strong>External:</strong> Give a name, select your physical NIC, click OK'},
           {text:'<strong>Internal:</strong> Give a name, select "Internal network", click OK'},
           {text:'<strong>Private:</strong> Give a name, select "Private network", click OK'},
           {text:'Assign to VM: VM Settings → Network Adapter → select your switch'},
         ]
        },
      ],
      quiz:{q:'You need two VMs to communicate with each other and with the host, but NOT with the internet. Which switch do you use?',opts:['External Switch','Private Switch','Internal Switch','Default Switch'],ans:2,exp:'The Internal Switch allows VM ↔ VM and VM ↔ Host communication but provides no internet access. Private Switch isolates VMs from the host too. External Switch adds internet access.'}
    },
  ]
},

         steps:[
           {text:'Open config file: <code>sudo nano /etc/ssh/sshd_config</code>'},
           {text:'Find the line <code>#Port 22</code> — remove the <code>#</code> (uncomment it)'},
           {text:'Change <code>22</code> to <code>22000</code>'},
           {text:'Save: <strong>Ctrl+O</strong> then Enter | Exit: <strong>Ctrl+X</strong>'},
           {text:'Reload systemd: <code>sudo systemctl daemon-reload</code>'},
           {text:'Restart SSH: <code>sudo systemctl restart ssh</code>'},
           {text:'Reconnect from Windows: <code>ssh -p 22000 username@ip</code>'},
         ]
        },
        {type:'hbox', style:'amber', icon:'💡', title:'Nano editor shortcuts',
         text:'<strong>Ctrl+O</strong> → Save (Write Out)<br><strong>Ctrl+X</strong> → Exit<br><strong>Ctrl+W</strong> → Search<br><strong>Ctrl+K</strong> → Cut line<br><strong>Ctrl+U</strong> → Paste\n\n<code>#</code> at start of a line = comment (ignored by the system). Remove # to activate a setting.'},
        {type:'hbox', style:'red', icon:'⚠️', title:'Always reload after config changes',
         text:'After editing ANY service configuration file, you must:\n1. <code>sudo systemctl daemon-reload</code> — tells systemd to re-read configs\n2. <code>sudo systemctl restart ssh</code> — restarts SSH with new settings\n\nWithout this, changes have no effect.'},
      ],

// ══════════════════════════════════════════════════════
//  STATE & STORAGE
// ══════════════════════════════════════════════════════
const SK = 'ic_course_v1';
function loadState(){
  try { return JSON.parse(localStorage.getItem(SK)) || {done:{}, xp:0}; }
  catch { return {done:{}, xp:0}; }
}
function saveState(s){ localStorage.setItem(SK, JSON.stringify(s)); }
let state = loadState();

function allLessons(){
  return COURSE.flatMap(ch => ch.lessons);
}
function totalLessons(){ return allLessons().length; }
function doneCount(){ return Object.keys(state.done).length; }
function isLessonDone(id){ return !!state.done[id]; }
function markDone(id){
  if(!state.done[id]){
    state.done[id] = true;
    state.xp = (state.xp||0) + 50;
    saveState(state);
  }
}

// ══════════════════════════════════════════════════════
//  BUILD SIDEBAR
// ══════════════════════════════════════════════════════
let currentLessonId = null;
let currentChapterId = null;

function buildSidebar(){
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = COURSE.map(ch => {
    const allDone = ch.lessons.every(l => isLessonDone(l.id));
    const anyDone = ch.lessons.some(l => isLessonDone(l.id));
    const isActive = ch.id === currentChapterId;
    return `
      <div class="nav-section">
        <button class="nav-ch ${isActive?'active':''} ${allDone?'completed':''}" onclick="selectChapter('${ch.id}')">
          <span class="nav-ch-icon">${ch.icon}</span>
          <div class="nav-ch-info">
            <div class="nav-ch-label">${ch.label}</div>
            <div class="nav-ch-name">${ch.title}</div>
          </div>
          <span class="nav-ch-check">${allDone?'✅':anyDone?'🔵':''}</span>
        </button>
        <div class="nav-lessons" id="nav-lessons-${ch.id}" style="${isActive?'display:block':'display:none'}">
          ${ch.lessons.map(l => `
            <button class="nav-lesson-btn ${l.id===currentLessonId?'active':''} ${isLessonDone(l.id)?'done':''}"
                    onclick="goLesson('${ch.id}','${l.id}')">
              <div class="lesson-dot"></div>
              ${l.title}
            </button>`).join('')}
        </div>
      </div>`;
  }).join('');
  updateProgress();
}

function updateProgress(){
  const done = doneCount(), total = totalLessons();
  const pct = total > 0 ? (done/total*100) : 0;
  document.getElementById('sidebarProgBar').style.width = pct + '%';
  document.getElementById('sidebarProgText').textContent = `${done} / ${total} lessons completed`;
  document.getElementById('xpVal').textContent = state.xp || 0;
}

function selectChapter(chId){
  // toggle lessons drawer
  const drawer = document.getElementById('nav-lessons-' + chId);
  const isOpen = drawer.style.display !== 'none';
  // collapse all
  COURSE.forEach(ch => {
    const d = document.getElementById('nav-lessons-' + ch.id);
    if(d) d.style.display = 'none';
    document.querySelectorAll('.nav-ch').forEach(b => b.classList.remove('active'));
  });
  if(!isOpen || chId !== currentChapterId){
    drawer.style.display = 'block';
    // go to first lesson of chapter
    const ch = COURSE.find(c => c.id === chId);
    if(ch && ch.lessons.length) goLesson(chId, ch.lessons[0].id);
  }
}

// ══════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════
function goHome(){
  currentLessonId = null; currentChapterId = null;
  document.getElementById('breadcrumb').innerHTML = '<span>Course Home</span>';
  document.getElementById('lessonCounter').textContent = '';
  renderHome();
  buildSidebar();
}

function goLesson(chId, lessonId){
  currentChapterId = chId;
  currentLessonId = lessonId;
  const ch = COURSE.find(c => c.id === chId);
  const lesson = ch.lessons.find(l => l.id === lessonId);
  const lessonIdx = ch.lessons.indexOf(lesson);
  document.getElementById('breadcrumb').innerHTML = `<span onclick="goHome()" style="cursor:pointer;color:var(--dim)">${ch.title}</span> <span style="color:var(--muted)">›</span> <span>${lesson.title}</span>`;
  const allLess = allLessons();
  const globalIdx = allLess.indexOf(lesson);
  document.getElementById('lessonCounter').textContent = `${globalIdx+1} / ${totalLessons()}`;
  renderLesson(ch, lesson);
  buildSidebar();
  document.getElementById('mainScroll').scrollTo(0,0);
}

function renderHome(){
  const done = doneCount(), total = totalLessons();
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  let html = `<div class="home-screen">
    <div class="home-hero">
      <div class="home-eyebrow">ICT · Operating Systems &amp; Networks · 2025–2026</div>
      <h1 class="home-title">Installation &amp; <span>Configuration</span></h1>
      <p class="home-sub">A complete interactive course covering all 9 chapters — from hardware assembly to Linux SSH. Work through each lesson, answer quizzes, and track your progress.</p>
      <div class="home-stats">
        <div class="home-stat blue"><div class="home-stat-val">${COURSE.length}</div><div class="home-stat-lbl">Chapters</div></div>
        <div class="home-stat green"><div class="home-stat-val">${total}</div><div class="home-stat-lbl">Lessons</div></div>
        <div class="home-stat amber"><div class="home-stat-val">${done}</div><div class="home-stat-lbl">Completed</div></div>
        <div class="home-stat purple"><div class="home-stat-val">${state.xp||0}</div><div class="home-stat-lbl">XP Earned</div></div>
      </div>
      <button class="start-course-btn" onclick="startOrContinue()">
        ${done === 0 ? '🚀 Start Course' : done === total ? '🎉 Course Complete!' : '▶ Continue Learning'}
      </button>
    </div>
    <div class="section" style="margin-bottom:10px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);">Chapters</div>
    <div class="ch-cards">
      ${COURSE.map(ch => {
        const chDone = ch.lessons.filter(l => isLessonDone(l.id)).length;
        const chPct = ch.lessons.length > 0 ? (chDone/ch.lessons.length*100) : 0;
        return `<div class="ch-card-home" onclick="selectChapter('${ch.id}')" style="--ch-col:${ch.color}">
          <style>.ch-card-home:hover { border-color: ${ch.color}33 !important; }
          #card-${ch.id}::before { background: ${ch.color}; }</style>
          <div id="card-${ch.id}" class="ch-card-home" style="display:contents"></div>
          <div class="ch-num-home">${ch.label}</div>
          <div class="ch-icon-home">${ch.icon}</div>
          <div class="ch-name-home">${ch.title}</div>
          <div class="ch-meta-home">${ch.lessons.length} lessons · ${chDone} completed</div>
          <div class="ch-prog-home"><div class="ch-prog-fill-home" style="width:${chPct}%;background:${ch.color}"></div></div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
  document.getElementById('pageContent').innerHTML = html;
}

function startOrContinue(){
  // find first undone lesson
  for(const ch of COURSE){
    for(const l of ch.lessons){
      if(!isLessonDone(l.id)){ goLesson(ch.id, l.id); return; }
    }
  }
  // all done
  goLesson(COURSE[0].id, COURSE[0].lessons[0].id);
}

function renderLesson(ch, lesson){
  let blocksHTML = lesson.blocks.map(b => renderBlock(b, ch.color)).join('');
  // quiz
  let quizHTML = '';
  if(lesson.quiz){
    const q = lesson.quiz;
    quizHTML = `<div class="mini-quiz" id="lessonQuiz">
      <div class="quiz-header"><span class="quiz-header-icon">🧠</span><span class="quiz-header-title">Quick Check — answer before moving on</span></div>
      <div class="quiz-body">
        <div class="quiz-q">${q.q}</div>
        <div class="quiz-opts">
          ${q.opts.map((opt,i) => `<button class="quiz-opt" onclick="answerQuiz(${i},${q.ans},'${escQ(q.exp)}')" data-i="${i}">${opt}</button>`).join('')}
        </div>
        <div class="quiz-exp" id="quizExp"></div>
      </div>
    </div>`;
  }
  // nav buttons
  const allLess = allLessons();
  const gi = allLess.indexOf(lesson);
  const prev = gi > 0 ? allLess[gi-1] : null;
  const next = gi < allLess.length-1 ? allLess[gi+1] : null;
  const isDone = isLessonDone(lesson.id);
  const footer = `<div class="lesson-footer">
    ${prev ? `<button class="nav-prev-btn" onclick="findAndGoLesson('${prev.id}')">← Previous</button>` : ''}
    <div class="lesson-footer-right">
      <button class="mark-done-btn" id="markDoneBtn" onclick="completLesson('${lesson.id}')" ${isDone?'disabled':''}>
        ${isDone ? '✅ Completed' : 'Mark as Complete'}
      </button>
      ${next ? `<button class="nav-next-btn" onclick="findAndGoLesson('${next.id}')">Next →</button>` : ''}
    </div>
  </div>`;
  document.getElementById('pageContent').innerHTML = `
    <div class="content">
      <div class="lesson-hero">
        <div class="lesson-tag">${lesson.tag}</div>
        <h1 class="lesson-title">${lesson.title}</h1>
        <p class="lesson-intro">${lesson.intro}</p>
      </div>
      ${blocksHTML}
      ${quizHTML}
    </div>
    ${footer}`;
}

function escQ(s){ return s.replace(/'/g,"\\'").replace(/"/g,"&quot;"); }

function findAndGoLesson(lessonId){
  for(const ch of COURSE){
    const l = ch.lessons.find(x => x.id === lessonId);
    if(l){ goLesson(ch.id, lessonId); return; }
  }
}

function completLesson(id){
  markDone(id);
  const btn = document.getElementById('markDoneBtn');
  if(btn){ btn.disabled = true; btn.textContent = '✅ Completed'; }
  updateProgress();
  buildSidebar();
  // auto-advance after 1.2s
  setTimeout(()=>{
    const allLess = allLessons();
    const lesson = allLess.find(l => l.id === id);
    const gi = allLess.indexOf(lesson);
    if(gi < allLess.length-1) findAndGoLesson(allLess[gi+1].id);
    else showComplete();
  }, 1200);
}

function showComplete(){
  document.getElementById('pageContent').innerHTML = `
    <div class="complete-screen">
      <div class="complete-inner">
        <div class="complete-icon">🎓</div>
        <div class="complete-title">Course Complete!</div>
        <div class="complete-msg">You have finished all ${totalLessons()} lessons across ${COURSE.length} chapters.<br>You earned <strong style="color:var(--amber)">${state.xp} XP</strong>!<br><br>Now use the Study App and Exam Simulator to prepare for the exam.</div>
        <button class="start-course-btn" onclick="goHome()">← Back to Course Home</button>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════════
//  BLOCK RENDERERS
// ══════════════════════════════════════════════════════
function renderBlock(b, color){
  let content = '';
  if(b.type === 'info'){
    content = `<div class="info-card">${b.text.replace(/\n/g,'<br>')}</div>`;
  } else if(b.type === 'hbox'){
    content = `<div class="hbox ${b.style}"><div class="hbox-icon">${b.icon}</div><div class="hbox-content"><strong>${b.title}</strong>${b.text.replace(/\n/g,'<br>')}</div></div>`;
  } else if(b.type === 'table'){
    const thead = b.headers.map(h=>`<th>${h}</th>`).join('');
    const tbody = b.rows.map(r=>`<tr>${r.map((c,i)=>`<td>${c}</td>`).join('')}</tr>`).join('');
    content = `<div style="overflow-x:auto"><table class="comp-table"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table></div>`;
  } else if(b.type === 'code'){
    const lines = b.lines.map(l=>{
      const cls = l.type==='comment'?'comment':l.type==='cmd'?'cmd':l.type==='path'?'path':l.type==='val'?'val':l.type==='kw'?'kw':'';
      return `<span class="${cls}">${l.text}</span>`;
    }).join('\n');
    content = `<div class="code-block"><div class="code-header"><span class="code-lang">${b.lang}</span><button class="copy-code-btn" onclick="copyCode(this)">copy</button></div><div class="code-body">${lines}</div></div>`;
  } else if(b.type === 'diagram'){
    content = `<div class="diagram">${b.content}</div>`;
  } else if(b.type === 'steps'){
    const steps = b.steps.map((s,i)=>`<div class="step"><div class="step-num">${i+1}</div><div class="step-content">${s.text}</div></div>`).join('');
    content = `<div class="steps">${steps}</div>`;
  } else if(b.type === 'kv'){
    const pills = b.items.map(item=>`<div class="kv-pill"><div class="kv-key">${item.key}</div><div class="kv-val">${item.val}</div><div class="kv-sub">${item.sub}</div></div>`).join('');
    content = `<div class="kv-grid">${pills}</div>`;
  }
  return `<div class="lesson-block">
    <div class="block-title" style="color:${color}">${b.title||''}</div>
    ${content}
  </div>`;
}

// ══════════════════════════════════════════════════════
//  QUIZ
// ══════════════════════════════════════════════════════
function answerQuiz(chosen, correct, exp){
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((o,i) => {
    o.classList.add('disabled');
    if(i === correct) o.classList.add('correct');
    else if(i === chosen && chosen !== correct) o.classList.add('wrong');
  });
  const expEl = document.getElementById('quizExp');
  expEl.classList.add('show', chosen === correct ? 'ok' : 'bad');
  expEl.innerHTML = `<strong>${chosen===correct?'✓ Correct!':'✗ Incorrect'}</strong> ${exp}`;
}

function copyCode(btn){
  const code = btn.closest('.code-block').querySelector('.code-body').innerText;
  navigator.clipboard.writeText(code).catch(()=>{});
  btn.textContent = 'copied!';
  setTimeout(()=>btn.textContent='copy', 1800);
}

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
buildSidebar();
renderHome();
</script>

</html>
