<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IC Exam Cheat Sheet — Last Day Revision</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

:root {
  --ink: #0d1117;
  --ink2: #161b22;
  --ink3: #1f2937;
  --wire: rgba(255,255,255,0.07);
  --wire2: rgba(255,255,255,0.13);
  --wire3: rgba(255,255,255,0.22);
  --text: #e6edf3;
  --dim: #8b949e;
  --muted: #484f58;
  --mono: 'Space Mono', monospace;
  --sans: 'Space Grotesk', system-ui, sans-serif;
  /* chapter accent colors */
  --c1: #58a6ff; --c2: #3fb950; --c3: #f78166;
  --c4: #d2a8ff; --c5: #ffa657; --c6: #ff7b72;
  --c7: #79c0ff; --c8: #56d364; --c9: #e3b341;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--ink);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HERO ── */
.hero {
  background: linear-gradient(180deg, #0d1117 0%, #111827 100%);
  border-bottom: 1px solid var(--wire);
  padding: 48px 24px 36px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(88,166,255,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.hero-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 14px;
}

.hero-title {
  font-size: clamp(28px, 6vw, 52px);
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: 12px;
}

.hero-title .accent { color: var(--c1); }

.hero-sub {
  font-size: 14px;
  color: var(--dim);
  max-width: 480px;
  margin: 0 auto 28px;
  line-height: 1.6;
}

/* chapter pills in hero */
.chapter-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  max-width: 720px;
  margin: 0 auto 28px;
}

.ch-pill {
  font-size: 11px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 20px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
  font-family: var(--sans);
  background: var(--ink2);
  color: var(--dim);
  border-color: var(--wire2);
}

.ch-pill:hover { color: var(--text); transform: translateY(-1px); }
.ch-pill.active { color: var(--ink); font-weight: 700; border-color: transparent; }

/* search */
.search-wrap {
  max-width: 400px;
  margin: 0 auto;
  position: relative;
}

.search-icon {
  position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted); font-size: 14px; pointer-events: none;
}

.search-input {
  width: 100%;
  background: var(--ink2);
  border: 1px solid var(--wire2);
  border-radius: 10px;
  padding: 10px 14px 10px 38px;
  font-size: 13px;
  color: var(--text);
  font-family: var(--sans);
  outline: none;
  transition: border-color 0.15s;
}

.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: var(--c1); }

/* ── MAIN LAYOUT ── */
.main {
  max-width: 880px;
  margin: 0 auto;
  padding: 32px 20px 80px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── CHAPTER BLOCK ── */
.ch-block {
  border-radius: 12px;
  border: 1px solid var(--wire);
  background: var(--ink2);
  overflow: hidden;
  transition: border-color 0.2s;
}

.ch-block:hover { border-color: var(--wire2); }
.ch-block.open { border-color: var(--wire3); }

.ch-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 20px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}

.ch-header:hover { background: rgba(255,255,255,0.02); }

.ch-accent-bar {
  width: 3px;
  height: 36px;
  border-radius: 3px;
  flex-shrink: 0;
}

.ch-icon { font-size: 20px; flex-shrink: 0; }

.ch-info { flex: 1; }

.ch-label {
  font-size: 9px;
  font-family: var(--mono);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 2px;
}

.ch-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.01em;
}

.ch-pill-count {
  font-size: 10px;
  font-family: var(--mono);
  padding: 3px 8px;
  border-radius: 20px;
  background: var(--ink3);
  color: var(--dim);
  border: 1px solid var(--wire);
}

.ch-chevron {
  color: var(--muted);
  font-size: 14px;
  transition: transform 0.25s;
  flex-shrink: 0;
}

.ch-block.open .ch-chevron { transform: rotate(180deg); }

.ch-body {
  display: none;
  border-top: 1px solid var(--wire);
}

.ch-block.open .ch-body { display: block; }

/* ── FACT CARDS ── */
.facts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1px;
  background: var(--wire);
}

.fact-card {
  background: var(--ink2);
  padding: 16px 18px;
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
}

.fact-card:hover { background: var(--ink3); }

.fact-card.expanded { background: var(--ink3); }

.fact-top {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.fact-indicator {
  width: 6px; height: 6px;
  border-radius: 50%;
  margin-top: 6px;
  flex-shrink: 0;
}

.fact-term {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.4;
  flex: 1;
}

.fact-expand-icon {
  font-size: 11px;
  color: var(--muted);
  transition: transform 0.2s;
  margin-top: 3px;
  flex-shrink: 0;
}

.fact-card.expanded .fact-expand-icon { transform: rotate(180deg); }

.fact-detail {
  display: none;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--wire);
  font-size: 12.5px;
  color: var(--dim);
  line-height: 1.7;
}

.fact-card.expanded .fact-detail { display: block; }

.fact-detail code {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--ink);
  color: var(--c1);
  padding: 1px 5px;
  border-radius: 4px;
}

.fact-detail .highlight {
  color: var(--text);
  font-weight: 600;
}

/* ── COMPARISON TABLE ── */
.compare-wrap { padding: 16px 18px; }

.compare-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}

.compare-table th {
  text-align: left;
  padding: 8px 10px;
  background: var(--ink3);
  color: var(--dim);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-family: var(--mono);
  border-bottom: 1px solid var(--wire2);
}

.compare-table td {
  padding: 9px 10px;
  border-bottom: 1px solid var(--wire);
  vertical-align: top;
  line-height: 1.5;
  color: var(--dim);
}

.compare-table tr:last-child td { border-bottom: none; }
.compare-table tr:hover td { background: rgba(255,255,255,0.02); color: var(--text); }

.compare-table td:first-child {
  font-weight: 600;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  white-space: nowrap;
}

/* ── CMD REFERENCE ── */
.cmd-list { padding: 0; }

.cmd-row {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 12px;
  padding: 10px 18px;
  border-bottom: 1px solid var(--wire);
  align-items: center;
  cursor: pointer;
  transition: background 0.1s;
}

.cmd-row:last-child { border-bottom: none; }
.cmd-row:hover { background: rgba(255,255,255,0.025); }

.cmd-code {
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--c1);
  background: var(--ink);
  padding: 4px 8px;
  border-radius: 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border: 1px solid var(--wire2);
}

.cmd-desc {
  font-size: 12px;
  color: var(--dim);
  line-height: 1.5;
}

.cmd-row:hover .cmd-desc { color: var(--text); }

/* ── EXAM TRAPS ── */
.traps-list { padding: 12px 18px; display: flex; flex-direction: column; gap: 8px; }

.trap-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  background: var(--ink);
  border: 1px solid var(--wire);
  border-radius: 8px;
  padding: 12px 14px;
  cursor: pointer;
  transition: all 0.15s;
}

.trap-item:hover { border-color: var(--wire2); background: var(--ink3); }
.trap-item.expanded { border-color: rgba(239,68,68,0.3); }

.trap-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

.trap-content { flex: 1; }

.trap-q {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 0;
  line-height: 1.4;
}

.trap-a {
  display: none;
  margin-top: 8px;
  font-size: 12px;
  color: var(--dim);
  line-height: 1.65;
  padding-top: 8px;
  border-top: 1px solid var(--wire);
}

.trap-item.expanded .trap-a { display: block; }
.trap-a .correct { color: #3fb950; font-weight: 600; }
.trap-a .wrong { color: #f78166; }
.trap-a code { font-family: var(--mono); font-size: 10.5px; background: var(--ink); color: var(--c1); padding: 1px 4px; border-radius: 3px; }

/* ── QUICK REFS (small pill grids) ── */
.pill-grid { padding: 14px 18px; display: flex; flex-wrap: wrap; gap: 8px; }

.ref-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--ink);
  border: 1px solid var(--wire2);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}

.ref-pill:hover { border-color: var(--wire3); background: var(--ink3); transform: translateY(-1px); }

.ref-pill-key {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
}

.ref-pill-val { color: var(--dim); font-size: 11.5px; }
.ref-pill:hover .ref-pill-val { color: var(--text); }

/* ── SEARCH HIGHLIGHT ── */
mark {
  background: rgba(88,166,255,0.25);
  color: var(--text);
  border-radius: 2px;
  padding: 0 1px;
}

/* ── NO RESULTS ── */
.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  display: none;
}

.no-results-icon { font-size: 36px; margin-bottom: 10px; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--ink3); border: 1px solid var(--wire3);
  color: var(--text); padding: 8px 18px;
  border-radius: 8px; font-size: 12.5px;
  opacity: 0; transition: all 0.2s;
  pointer-events: none; z-index: 999;
  font-family: var(--sans);
}

/* ── PROGRESS BAR ── */
.reading-bar {
  position: fixed; top: 0; left: 0; right: 0; height: 2px;
  background: var(--wire); z-index: 100;
}
.reading-fill {
  height: 100%; background: linear-gradient(90deg, var(--c1), var(--c7));
  width: 0%; transition: width 0.1s;
}

/* ── STICKY COUNTER ── */
.sticky-bar {
  position: sticky; top: 0; z-index: 40;
  background: rgba(13,17,23,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--wire);
  padding: 8px 20px;
  display: flex; align-items: center; gap: 12px;
  font-size: 11px; color: var(--muted);
}

.sticky-counts { display: flex; gap: 12px; flex-wrap: wrap; }
.sticky-count { display: flex; align-items: center; gap: 5px; }
.sticky-dot { width: 6px; height: 6px; border-radius: 50%; }
.expand-all-btn {
  margin-left: auto;
  background: var(--ink3); border: 1px solid var(--wire2);
  color: var(--dim); font-size: 11px; padding: 4px 10px;
  border-radius: 5px; cursor: pointer; font-family: var(--sans);
  transition: all 0.15s;
}
.expand-all-btn:hover { color: var(--text); border-color: var(--wire3); }

/* ── SECTION LABEL ── */
.section-label {
  font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); font-family: var(--mono);
  padding: 10px 18px 4px;
  border-bottom: 1px solid var(--wire);
}

@media (max-width: 600px) {
  .hero { padding: 32px 16px 24px; }
  .facts-grid { grid-template-columns: 1fr; }
  .cmd-row { grid-template-columns: 1fr; gap: 4px; }
  .main { padding: 20px 12px 60px; }
  .sticky-counts { gap: 8px; }
}
</style>
</head>
<body>

<div class="reading-bar"><div class="reading-fill" id="readingFill"></div></div>

<!-- ── HERO ── -->
<div class="hero">
  <div class="hero-eyebrow">ICT · OS &amp; Networks · 2025–2026</div>
  <h1 class="hero-title">Exam <span class="accent">Cheat Sheet</span></h1>
  <p class="hero-sub">Every critical fact, comparison, command and trap — all 9 chapters. Click any card to expand. Click again to collapse.</p>

  <div class="chapter-nav" id="chapterNav"></div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text"
           placeholder="Search any term, command or concept…"
           oninput="handleSearch()" autocomplete="off">
  </div>
</div>

<!-- ── STICKY BAR ── -->
<div class="sticky-bar">
  <div class="sticky-counts" id="stickyCounts"></div>
  <button class="expand-all-btn" onclick="toggleAll()">Expand all</button>
</div>

<!-- ── MAIN ── -->
<main class="main" id="mainContent"></main>

<div class="no-results" id="noResults">
  <div class="no-results-icon">🔍</div>
  <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px;">Nothing found</div>
  <div>Try a different search term.</div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  DATA — all 9 chapters
// ═══════════════════════════════════════════════════════
const CHAPTERS = [
{
  id:'ch1', label:'Chapter 1', title:'Computer Assembly', icon:'🔩',
  color:'var(--c1)',
  sections:[
    {
      type:'facts', title:'Core Components',
      items:[
        {term:'CPU (Central Processing Unit)',detail:'The brain of the computer. Executes all calculations and instructions. Made by Intel (LGA socket) or AMD (PGA/LGA socket). Performance = Clock Speed × Architecture.'},
        {term:'Clock Speed',detail:'Measured in GHz. 1 GHz = 1000 MHz. Higher = more cycles per second. Formula: <code>CPU Frequency = Multiplier × Bus Speed</code>'},
        {term:'P-cores vs E-cores',detail:'<span class="highlight">P-cores (Performance):</span> heavy tasks — gaming, video editing. <span class="highlight">E-cores (Efficiency):</span> light background tasks. Modern Intel hybrid architecture.'},
        {term:'Cache Memory L1/L2/L3',detail:'<span class="highlight">L1:</span> Fastest, smallest, per-core. <span class="highlight">L2:</span> Medium, per-core. <span class="highlight">L3:</span> Largest, slowest of the three, SHARED by all cores.'},
        {term:'Motherboard (MoBo)',detail:'Main circuit board. Connects CPU, RAM, GPU, storage. Form factors: <span class="highlight">ATX</span> (full size), <span class="highlight">mATX</span> (mid), <span class="highlight">Mini-ITX</span> (small). Chipset determines PCIe lanes, USB ports.'},
        {term:'RAM (Random Access Memory)',detail:'Working memory. Cleared when PC powers off. Generations: DDR4, DDR5 — NOT interchangeable. <span class="highlight">Dual channel</span> = two sticks working together, doubles bandwidth.'},
        {term:'Storage Types',detail:'<span class="highlight">HDD:</span> Mechanical, SATA, slow. <span class="highlight">SSD:</span> Flash, SATA, fast. <span class="highlight">M.2 NVMe:</span> PCIe interface, fastest. Protocol: HDD/SSD = AHCI, NVMe = NVMe protocol.'},
        {term:'GPU (Graphics Card)',detail:'Handles rendering and display output. VRAM (Video RAM) uses GDDR memory. Much higher bandwidth than regular DDR (256-bit vs 64-bit).'},
        {term:'PSU (Power Supply Unit)',detail:'Converts AC mains to DC. Rated in Watts. <span class="highlight">80+ certification</span> = efficiency: Bronze → Silver → Gold → Platinum → Titanium.'},
        {term:'ESD Protection',detail:'ElectroStatic Discharge can permanently destroy components. Always use anti-static mat or wrist strap. Touch metal case to discharge before handling parts.'},
      ]
    },
    {
      type:'compare', title:'Storage Speed Comparison',
      headers:['Type','Interface','Speed','Use Case'],
      rows:[
        ['HDD','SATA','~120 MB/s','Mass storage, backups'],
        ['SSD (SATA)','SATA','~550 MB/s','OS drive, everyday use'],
        ['M.2 NVMe','PCIe 3.0','~3500 MB/s','High performance, fast boot'],
        ['M.2 NVMe','PCIe 4.0','~7000 MB/s','Workstations, gaming rigs'],
      ]
    },
    {
      type:'compare', title:'Intel CPU Name Decoder: i7-8550U',
      headers:['Part','Value','Meaning'],
      rows:[
        ['Model','i7','Performance tier (i3 < i5 < i7 < i9)'],
        ['Generation','8','8th generation (Coffee Lake)'],
        ['SKU','550','Performance within generation (higher = better)'],
        ['Suffix','U','Ultra-low power (U = mobile, K = unlocked/overclock, H = high perf mobile)'],
      ]
    },
  ]
},

{
  id:'ch2', label:'Chapter 2', title:'BIOS / UEFI', icon:'⚙️',
  color:'var(--c2)',
  sections:[
    {
      type:'facts', title:'Key Terms',
      items:[
        {term:'BIOS (Basic Input Output System)',detail:'Legacy firmware chip on the motherboard. Manages POST and hardware initialisation. Text-only interface, keyboard only. No GUI, no mouse.'},
        {term:'POST (Power-On Self-Test)',detail:'Diagnostic check BIOS runs at every startup. Verifies CPU, RAM, storage and other hardware. Errors = beep codes from the onboard speaker.'},
        {term:'UEFI (Unified Extensible Firmware Interface)',detail:'Modern replacement for BIOS. Key upgrades: GPT support, Fast Boot, GUI with mouse, Secure Boot, TPM integration.'},
        {term:'Secure Boot',detail:'UEFI feature that checks digital signatures of startup software. Blocks unsigned/untrusted code from loading. Required for Windows 11.'},
        {term:'TPM (Trusted Platform Module)',detail:'Hardware chip that stores cryptographic keys. Used for BitLocker encryption and Windows 11 requirement. Version needed: <code>TPM 2.0</code>'},
        {term:'CMOS Chip',detail:'Stores BIOS settings: date, time, boot order, hardware config. Powered by the <span class="highlight">CR2032 coin cell battery</span>. When battery dies → settings reset to default.'},
        {term:'Jumpers',detail:'Hardware pins on the motherboard. Used for hardware-level configuration. Primary use: <span class="highlight">resetting the BIOS password</span>. Removing CMOS battery does NOT clear passwords.'},
        {term:'XMP / EXPO Profiles',detail:'BIOS profiles to run RAM at its advertised (rated) speed. <span class="highlight">XMP</span> = Intel, <span class="highlight">EXPO</span> = AMD. Without them, RAM runs at stock slower speeds.'},
        {term:'BIOS Flashing',detail:'Writing new firmware to the BIOS chip. Upgrades features and fixes bugs. <span class="highlight">⚠️ NEVER power off during flashing</span> — it will brick the board.'},
        {term:'Fast Boot',detail:'UEFI feature that skips some POST checks and initialises hardware in parallel. Reduces startup time. Side effect: may prevent entering BIOS. Fix: full shutdown first.'},
      ]
    },
    {
      type:'compare', title:'MBR vs GPT — Know This Cold',
      headers:['Feature','MBR (Legacy BIOS)','GPT (UEFI)'],
      rows:[
        ['Max drive size','~2 TB','Zettabytes (virtually unlimited)'],
        ['Max partitions','4 primary partitions','128 partitions'],
        ['Firmware','Legacy BIOS','UEFI'],
        ['Boot record','First sector of disk','Multiple backup copies'],
        ['Windows 11','❌ Not supported','✅ Required'],
        ['Secure Boot','❌ Not available','✅ Supported'],
      ]
    },
    {
      type:'traps', title:'Common Exam Traps',
      items:[
        {q:'Removing the CMOS battery clears the BIOS password.',a:'<span class="wrong">❌ FALSE.</span> Removing the battery resets date/time and settings but NOT passwords. Use <code>jumpers</code> to clear the password.'},
        {q:'UEFI and BIOS both use MBR partition tables.',a:'<span class="wrong">❌ FALSE.</span> UEFI uses <span class="correct">GPT</span>. Legacy BIOS uses MBR. UEFI can boot MBR in CSM (compatibility) mode, but GPT is the native format.'},
        {q:'Secure Boot encrypts your drive.',a:'<span class="wrong">❌ FALSE.</span> Secure Boot only verifies startup software signatures. Drive encryption is done by <span class="correct">BitLocker + TPM</span>.'},
        {q:'Fast Boot always makes entering BIOS faster.',a:'<span class="wrong">❌ FALSE.</span> Fast Boot can actually PREVENT you from entering BIOS. If stuck, do a full shutdown (not restart), then power on.'},
        {q:'GPT supports a maximum of 64 partitions.',a:'<span class="wrong">❌ FALSE.</span> GPT supports up to <span class="correct">128 partitions</span> by default. MBR is limited to 4 primary partitions.'},
      ]
    },
  ]
},

{
  id:'ch3', label:'Chapter 3', title:'Bootable Media', icon:'💾',
  color:'var(--c3)',
  sections:[
    {
      type:'facts', title:'Key Concepts',
      items:[
        {term:'ISO File',detail:'An exact image copy of a CD/DVD stored as a single file. Extension: <code>.iso</code>. Standard: ISO-9660. Used to install operating systems.'},
        {term:'Ventoy',detail:'Multiboot USB tool. Install once, then just copy ISO files to the USB. Supports multiple ISOs, GPT, and Secure Boot. <span class="highlight">No re-flashing needed when adding new ISOs.</span>'},

// ═══════════════════════════════════════════════════════
//  BUILD
// ═══════════════════════════════════════════════════════
function build(){
  // chapter nav pills
  const nav = document.getElementById('chapterNav');
  nav.innerHTML = '<button class="ch-pill active" data-ch="all" onclick="filterChapter(\'all\',this)" style="background:var(--ink3);color:var(--text);">All chapters</button>';
  CHAPTERS.forEach(ch => {
    nav.innerHTML += `<button class="ch-pill" data-ch="${ch.id}" onclick="filterChapter('${ch.id}',this)" style="--col:${ch.color}">${ch.label}</button>`;
  });

  // main content
  const main = document.getElementById('mainContent');
  main.innerHTML = CHAPTERS.map(ch => buildChapterBlock(ch)).join('');

  // sticky counts
  buildStickyCounts();
}

function buildChapterBlock(ch){
  const sectionsHTML = ch.sections.map(s => buildSection(s, ch.color)).join('');
  const totalItems = ch.sections.reduce((sum,s) => sum + (s.items||s.rows||[]).length, 0);
  return `
<div class="ch-block" id="${ch.id}" data-ch="${ch.id}">
  <div class="ch-header" onclick="toggleChapter('${ch.id}')">
    <div class="ch-accent-bar" style="background:${ch.color}"></div>
    <div class="ch-icon">${ch.icon}</div>
    <div class="ch-info">
      <div class="ch-label">${ch.label}</div>
      <div class="ch-title">${ch.title}</div>
    </div>
    <div class="ch-pill-count">${totalItems} items</div>
    <div class="ch-chevron">▾</div>
  </div>
  <div class="ch-body">${sectionsHTML}</div>
</div>`;
}

function buildSection(s, color){
  let html = `<div class="section-label">${s.title}</div>`;
  if(s.type === 'facts'){
    html += `<div class="facts-grid">` +
      s.items.map(item => `
        <div class="fact-card" onclick="toggleFact(this)">
          <div class="fact-top">
            <div class="fact-indicator" style="background:${color}"></div>
            <div class="fact-term">${item.term}</div>
            <div class="fact-expand-icon">▾</div>
          </div>
          <div class="fact-detail">${item.detail}</div>
        </div>`).join('') + `</div>`;
  }
  else if(s.type === 'compare'){
    html += `<div class="compare-wrap"><table class="compare-table">
      <thead><tr>${s.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${s.rows.map(row=>`<tr>${row.map((c,i)=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
    </table></div>`;
  }
  else if(s.type === 'cmds'){
    html += `<div class="cmd-list">` +
      s.items.map(item => `
        <div class="cmd-row" onclick="copyCmd('${item.cmd.replace(/'/g,"\\'")}')">
          <div class="cmd-code">${item.cmd}</div>
          <div class="cmd-desc">${item.desc}</div>
        </div>`).join('') + `</div>`;
  }
  else if(s.type === 'traps'){
    html += `<div class="traps-list">` +
      s.items.map(item => `
        <div class="trap-item" onclick="toggleTrap(this)">
          <div class="trap-icon">⚠️</div>
          <div class="trap-content">
            <div class="trap-q">${item.q}</div>
            <div class="trap-a">${item.a}</div>
          </div>
          <div style="color:var(--muted);font-size:13px;transition:transform .2s;" class="trap-chevron">▾</div>
        </div>`).join('') + `</div>`;
  }
  return html;
}

function buildStickyCounts(){
  const counts = document.getElementById('stickyCounts');
  const types = [
    {label:'Facts', color:'var(--c1)', count: CHAPTERS.reduce((s,c)=>s+c.sections.filter(x=>x.type==='facts').reduce((ss,x)=>ss+(x.items||[]).length,0),0)},
    {label:'Comparisons', color:'var(--c2)', count: CHAPTERS.reduce((s,c)=>s+c.sections.filter(x=>x.type==='compare').reduce((ss,x)=>ss+(x.rows||[]).length,0),0)},
    {label:'Commands', color:'var(--c6)', count: CHAPTERS.reduce((s,c)=>s+c.sections.filter(x=>x.type==='cmds').reduce((ss,x)=>ss+(x.items||[]).length,0),0)},
    {label:'Exam traps', color:'var(--c3)', count: CHAPTERS.reduce((s,c)=>s+c.sections.filter(x=>x.type==='traps').reduce((ss,x)=>ss+(x.items||[]).length,0),0)},
  ];
  counts.innerHTML = types.map(t =>
    `<div class="sticky-count"><div class="sticky-dot" style="background:${t.color}"></div><span>${t.count} ${t.label}</span></div>`
  ).join('');
}

// ═══════════════════════════════════════════════════════
//  INTERACTIONS
// ═══════════════════════════════════════════════════════
function toggleChapter(id){
  const block = document.getElementById(id);
  block.classList.toggle('open');
}

function toggleFact(el){
  el.classList.toggle('expanded');
}

function toggleTrap(el){
  el.classList.toggle('expanded');
  const chev = el.querySelector('.trap-chevron');
  if(chev) chev.style.transform = el.classList.contains('expanded') ? 'rotate(180deg)' : '';
}

let allOpen = false;
function toggleAll(){
  allOpen = !allOpen;
  document.querySelectorAll('.ch-block').forEach(b => {
    if(allOpen) b.classList.add('open');
    else b.classList.remove('open');
  });
  if(allOpen){
    document.querySelectorAll('.fact-card').forEach(c => c.classList.add('expanded'));
    document.querySelectorAll('.trap-item').forEach(t => {
      t.classList.add('expanded');
      const chev = t.querySelector('.trap-chevron');
      if(chev) chev.style.transform = 'rotate(180deg)';
    });
  } else {
    document.querySelectorAll('.fact-card').forEach(c => c.classList.remove('expanded'));
    document.querySelectorAll('.trap-item').forEach(t => {
      t.classList.remove('expanded');
      const chev = t.querySelector('.trap-chevron');
      if(chev) chev.style.transform = '';
    });
  }
  document.querySelector('.expand-all-btn').textContent = allOpen ? 'Collapse all' : 'Expand all';
}

function filterChapter(id, btn){
  document.querySelectorAll('.ch-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.ch-block').forEach(b => {
    if(id === 'all'){
      b.style.display = '';
    } else {
      b.style.display = b.dataset.ch === id ? '' : 'none';
      if(b.dataset.ch === id) b.classList.add('open');
    }
  });
  if(id === 'all'){
    document.querySelector('.ch-pill').style.background = 'var(--ink3)';
  }
}

// style active chapter pills
document.querySelectorAll('.ch-pill[data-ch]:not([data-ch="all"])').forEach((pill,i) => {
  const color = CHAPTERS[i]?.color || '#888';
  pill.addEventListener('mouseenter', () => {
    if(!pill.classList.contains('active')) pill.style.borderColor = color;
  });
  pill.addEventListener('mouseleave', () => {
    if(!pill.classList.contains('active')) pill.style.borderColor = '';
  });
});

// ═══════════════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════════════
function handleSearch(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const main = document.getElementById('mainContent');
  const noRes = document.getElementById('noResults');

  if(!q){
    // restore
    document.querySelectorAll('.ch-block').forEach(b => b.style.display = '');
    document.querySelectorAll('.fact-term,.cmd-desc,.trap-q,.compare-table td').forEach(el => {
      el.innerHTML = el.innerHTML.replace(/<\/?mark>/g,'');
    });
    noRes.style.display = 'none';
    return;
  }

  let anyVisible = false;

  document.querySelectorAll('.ch-block').forEach(block => {
    const text = block.textContent.toLowerCase();
    if(text.includes(q)){
      block.style.display = '';
      block.classList.add('open');
      anyVisible = true;

      // expand matching fact cards
      block.querySelectorAll('.fact-card').forEach(card => {
        const t = card.textContent.toLowerCase();
        if(t.includes(q)) card.classList.add('expanded');
      });

      block.querySelectorAll('.trap-item').forEach(trap => {
        const t = trap.textContent.toLowerCase();
        if(t.includes(q)){
          trap.classList.add('expanded');
          const chev = trap.querySelector('.trap-chevron');
          if(chev) chev.style.transform = 'rotate(180deg)';
        }
      });
    } else {
      block.style.display = 'none';
    }
  });

  noRes.style.display = anyVisible ? 'none' : 'block';
  main.style.display = anyVisible ? '' : 'none';
}

// ═══════════════════════════════════════════════════════
//  COPY COMMAND
// ═══════════════════════════════════════════════════════
function copyCmd(cmd){
  navigator.clipboard.writeText(cmd).catch(()=>{});
  const t = document.getElementById('toast');
  t.textContent = `📋 Copied: ${cmd}`;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{
    t.style.opacity = '0';
    t.style.transform = 'translateX(-50%) translateY(16px)';
  }, 1800);
}

// ═══════════════════════════════════════════════════════
//  READING PROGRESS BAR
// ═══════════════════════════════════════════════════════
window.addEventListener('scroll', () => {
  const el = document.getElementById('readingFill');
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  el.style.width = (scrollTop / docHeight * 100) + '%';
});

// ═══════════════════════════════════════════════════════
//  KEYBOARD SHORTCUT
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if(e.key === '/' && document.activeElement !== document.getElementById('searchInput')){
    e.preventDefault();
    document.getElementById('searchInput').focus();
    window.scrollTo({top:0, behavior:'smooth'});
  }
  if(e.key === 'Escape'){
    document.getElementById('searchInput').value = '';
    handleSearch();
    document.getElementById('searchInput').blur();
  }
});

// ═══════════════════════════════════════════════════════
//  CHAPTER PILL ACTIVE COLOR
// ═══════════════════════════════════════════════════════
function setActivePillStyle(){
  document.querySelectorAll('.ch-pill.active[data-ch]:not([data-ch="all"])').forEach((pill,i) => {
    const idx = CHAPTERS.findIndex(c=>c.id===pill.dataset.ch);
    if(idx>=0){
      const color = CHAPTERS[idx].color.replace('var(--','').replace(')','');
      const hex = getComputedStyle(document.documentElement).getPropertyValue('--'+color).trim();
      pill.style.background = hex;
      pill.style.borderColor = 'transparent';
      pill.style.color = '#0d1117';
    }
  });
}

// Override filterChapter to also style pills
const _origFilter = filterChapter;
window.filterChapter = function(id, btn){
  _origFilter(id, btn);
  document.querySelectorAll('.ch-pill').forEach(p => {
    if(p.classList.contains('active')){
      if(p.dataset.ch === 'all'){
        p.style.background = 'var(--ink3)';
        p.style.color = 'var(--text)';
        p.style.borderColor = 'var(--wire2)';
      } else {
        const idx = CHAPTERS.findIndex(c=>c.id===p.dataset.ch);
        if(idx>=0){
          p.style.background = CHAPTERS[idx].color;
          p.style.color = '#0d1117';
          p.style.borderColor = 'transparent';
        }
      }
    } else {
      p.style.background = 'var(--ink2)';
      p.style.color = 'var(--dim)';
      p.style.borderColor = 'var(--wire2)';
    }
  });
};

// ═══════════════════════════════════════════════════════
build();
</script>
