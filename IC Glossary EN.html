<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IC Study Guide — Terms &amp; Definitions</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #171b26;
    --bg3: #1e2333;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0;
    --muted: #8890a8;
    --accent: #4f8ef7;
    --radius: 10px;
    --radius-sm: 6px;
    --font: 'Inter', system-ui, -apple-system, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .layout { display: flex; min-height: 100vh; }

  .sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-logo {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-logo .label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .sidebar-logo .title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .sidebar-logo .subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .sidebar-nav { padding: 12px 10px; flex: 1; }

  .nav-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 4px 10px 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    transition: all 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .nav-item:hover { background: var(--bg3); color: var(--text); }

  .nav-item.active {
    background: rgba(79,142,247,0.12);
    color: var(--accent);
    font-weight: 500;
  }

  .nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .nav-count {
    margin-left: auto;
    font-size: 11px;
    background: var(--bg3);
    padding: 1px 6px;
    border-radius: 20px;
    color: var(--muted);
  }

  .nav-item.active .nav-count {
    background: rgba(79,142,247,0.2);
    color: var(--accent);
  }

  .sidebar-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  .topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .search-wrap { flex: 1; max-width: 520px; position: relative; }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 9px 12px 9px 36px;
    font-size: 14px;
    color: var(--text);
    font-family: var(--font);
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); }

  .clear-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 9px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.15s;
    white-space: nowrap;
  }

  .clear-btn:hover { color: var(--text); border-color: var(--border2); }

  .stats-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  .stats-count { color: var(--text); font-weight: 600; }

  .content { padding: 28px; flex: 1; }

  .section-block { margin-bottom: 40px; }

  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .section-label-dot { width: 10px; height: 10px; border-radius: 50%; }
  .section-label-text { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: 0.01em; }
  .section-label-count { font-size: 11px; color: var(--muted); margin-left: auto; }

  .terms-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
    margin-bottom: 36px;
  }

  .term-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
    cursor: pointer;
  }

  .term-card:hover { border-color: var(--border2); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .term-card.open { border-color: var(--border2); }

  .term-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
  }

  .term-accent { width: 3px; height: 28px; border-radius: 3px; flex-shrink: 0; }

  .term-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; line-height: 1.3; }

  .abbr-tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--bg3);
    color: var(--muted);
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  .chevron-icon { color: var(--muted); font-size: 13px; transition: transform 0.2s; flex-shrink: 0; }
  .term-card.open .chevron-icon { transform: rotate(180deg); }

  .term-body {
    display: none;
    font-size: 13.5px;
    color: var(--muted);
    line-height: 1.75;
    border-top: 1px solid var(--border);
    padding: 12px 16px 16px 29px;
    margin: 0 16px;
  }

  .term-card.open .term-body { display: block; }

  .no-results { text-align: center; padding: 60px 20px; color: var(--muted); }
  .no-results-icon { font-size: 40px; margin-bottom: 12px; }
  .no-results-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .no-results-sub { font-size: 13px; }

  .menu-toggle {
    display: none;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
  }

  @media (max-width: 700px) {
    .sidebar { display: none; position: fixed; z-index: 100; width: 240px; height: 100vh; top: 0; left: 0; }
    .sidebar.open { display: flex; }
    .menu-toggle { display: block; }
    .content { padding: 16px; }
    .topbar { padding: 10px 14px; }
    .terms-grid { grid-template-columns: 1fr; }
    .stats-bar { display: none; }
  }

  kbd {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 5px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 3px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="label">ICT · OS &amp; Networks · 2025–2026</div>
      <div class="title">Installation &amp; Configuration</div>
      <div class="subtitle">Study Guide — 80 terms</div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-label">Chapters</div>
      <button class="nav-item active" onclick="setChapter('all', this)">
        <span class="nav-dot" style="background:#8890a8"></span>
        All chapters
        <span class="nav-count" id="cnt-all">80</span>
      </button>
      <button class="nav-item" onclick="setChapter('H1', this)">
        <span class="nav-dot" style="background:#4f8ef7"></span>
        Ch.1 – Assembly
        <span class="nav-count" id="cnt-H1"></span>
      </button>
      <button class="nav-item" onclick="setChapter('H2', this)">
        <span class="nav-dot" style="background:#6ee7b7"></span>
        Ch.2 – BIOS/UEFI
        <span class="nav-count" id="cnt-H2"></span>
      </button>
      <button class="nav-item" onclick="setChapter('H3', this)">
        <span class="nav-dot" style="background:#f472b6"></span>
        Ch.3 – Bootable Media
        <span class="nav-count" id="cnt-H3"></span>
      </button>
      <button class="nav-item" onclick="setChapter('H4', this)">
        <span class="nav-dot" style="background:#fbbf24"></span>
        Ch.4 – Installation
        <span class="nav-count" id="cnt-H4"></span>
      </button>
      <button class="nav-item" onclick="setChapter('H5', this)">
        <span class="nav-dot" style="background:#a78bfa"></span>
        Ch.5 – Windows Tools
        <span class="nav-count" id="cnt-H5"></span>
      </button>
      <button class="nav-item" onclick="setChapter('H6', this)">
        <span class="nav-dot" style="background:#f87171"></span>
        Ch.6 – Terminal (CMD)
        <span class="nav-count" id="cnt-H6"></span>
      </button>
      <button class="nav-item" onclick="setChapter('H7', this)">
        <span class="nav-dot" style="background:#34d399"></span>
        Ch.7 – Virtualisation
        <span class="nav-count" id="cnt-H7"></span>
      </button>
      <button class="nav-item" onclick="setChapter('H8', this)">
        <span class="nav-dot" style="background:#38bdf8"></span>
        Ch.8 – WSL
        <span class="nav-count" id="cnt-H8"></span>
      </button>
      <button class="nav-item" onclick="setChapter('H9', this)">
        <span class="nav-dot" style="background:#fb923c"></span>
        Ch.9 – Linux
        <span class="nav-count" id="cnt-H9"></span>
      </button>
    </nav>

    <div class="sidebar-footer">
      Click a term to reveal its definition.<br>
      Press <kbd>/</kbd> to focus search.
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput"
               placeholder="Search terms or definitions…"
               oninput="render()" autocomplete="off">
      </div>
      <button class="clear-btn" onclick="clearSearch()">Clear</button>
      <div class="stats-bar">
        <span class="stats-count" id="statsCount">80</span>
        <span>terms visible</span>
      </div>
    </div>

    <div class="content" id="content"></div>

  </div>
</div>

<script>
const COLORS = {
  H1:'#4f8ef7', H2:'#6ee7b7', H3:'#f472b6',
  H4:'#fbbf24', H5:'#a78bfa', H6:'#f87171',
  H7:'#34d399', H8:'#38bdf8', H9:'#fb923c'
};

const CHAPTER_NAMES = {
  H1:'Ch.1 – Assembly',
  H2:'Ch.2 – BIOS / UEFI',
  H3:'Ch.3 – Bootable Media',
  H4:'Ch.4 – Installation',
  H5:'Ch.5 – Windows Tools',
  H6:'Ch.6 – Terminal (CMD)',
  H7:'Ch.7 – Virtualisation',
  H8:'Ch.8 – WSL',
  H9:'Ch.9 – Linux'
};

const TERMS = [
  // ── CH2 BIOS/UEFI ──
  {ch:'H2',term:'BIOS',full:'Basic Input Output System',def:'Firmware embedded by the manufacturer in a chip on the motherboard. Manages communication between the operating system and the hardware.'},
  {ch:'H2',term:'Firmware',def:'Software permanently embedded by the manufacturer into a chip — such as BIOS or UEFI on the motherboard.'},
  {ch:'H2',term:'POST',full:'Power-On Self-Test',def:'A diagnostic check the BIOS runs at startup to verify that all hardware components are functioning correctly.'},
  {ch:'H2',term:'UEFI',full:'Unified Extensible Firmware Interface',def:'The successor to Legacy BIOS. Modern firmware with support for larger drives (GPT), faster boot, a graphical interface, and improved security features.'},
  {ch:'H2',term:'GPT',full:'GUID Partition Table',def:'Partition table used by UEFI. Supports drives up to zettabytes in size and up to 128 partitions.'},
  {ch:'H2',term:'MBR',full:'Master Boot Record',def:'Older partition table used by Legacy BIOS. Supports drives up to approximately 2 TB.'},
  {ch:'H2',term:'Secure Boot',def:'A UEFI security feature that verifies whether startup software is trusted, preventing malware from loading during the boot process.'},
  {ch:'H2',term:'TPM',full:'Trusted Platform Module',def:'A hardware chip that stores cryptographic keys and verifies that the system boots in a trusted state. Used for BitLocker and required for Windows 11.'},
  {ch:'H2',term:'Fast Boot',def:'A UEFI feature that reduces startup time by initialising hardware more efficiently and in parallel rather than sequentially.'},
  {ch:'H2',term:'CMOS',def:'A chip on the motherboard that stores BIOS/UEFI settings such as date, time, drive configuration, and CPU info. Powered by the CMOS battery.'},
  {ch:'H2',term:'CMOS Battery',def:'A small battery (typically CR2032) on the motherboard that keeps the CMOS chip powered so settings are retained when the computer is off.'},
  {ch:'H2',term:'Jumpers',def:'Small connector pins on the motherboard used to configure hardware settings — for example, to reset the BIOS password.'},
  {ch:'H2',term:'XMP / EXPO',def:'Extreme Memory Profile (Intel) / Extended Profiles for Overclocking (AMD). BIOS profiles that allow RAM to run at speeds higher than the default specification.'},
  {ch:'H2',term:'Boot Order',def:'The sequence of devices (USB, SSD, network…) that the BIOS/UEFI checks when looking for an operating system to start.'},
  {ch:'H2',term:'BIOS Flashing',def:'The process of upgrading (or downgrading) the BIOS/UEFI firmware to a new version, typically via a file on a USB drive.'},

  // ── CH1 ASSEMBLY ──
  {ch:'H1',term:'CPU',full:'Central Processing Unit',def:'The main processor of a computer. Executes calculations and instructions. Manufactured by Intel or AMD.'},
  {ch:'H1',term:'LGA',full:'Land Grid Array',def:'Intel socket type where the pins are located on the motherboard, not on the CPU.'},
  {ch:'H1',term:'PGA',full:'Pin Grid Array',def:'AMD socket type (up to AM4) where the pins are located on the CPU itself.'},
  {ch:'H1',term:'P-cores',def:'Performance Cores. Powerful cores in modern Intel processors designed for demanding tasks such as gaming and video editing.'},
  {ch:'H1',term:'E-cores',def:'Efficiency Cores. Energy-efficient cores in modern Intel processors designed for light background tasks.'},
  {ch:'H1',term:'Clock Speed',def:'The speed of the CPU expressed in GHz. Indicates how many cycles per second the CPU executes. 1 GHz = 1000 MHz.'},
  {ch:'H1',term:'Cache Memory',def:'Very fast internal memory inside the CPU (L1, L2, L3) that reduces access time to frequently used data. L1 is the fastest and smallest; L3 is the largest.'},
  {ch:'H1',term:'Multiplier',def:'The factor by which the bus speed is multiplied to calculate the CPU clock speed. Can be adjusted when overclocking.'},
  {ch:'H1',term:'Bus Speed',def:'The base clock speed of the motherboard (FSB). Multiplied by the CPU multiplier to determine the processor frequency.'},
  {ch:'H1',term:'Motherboard (MoBo)',def:'The main circuit board of a computer to which all components (CPU, RAM, GPU, storage) are connected.'},
  {ch:'H1',term:'Chipset',def:'Controls communication between the CPU, RAM, storage, and other components. Determines the number of PCIe lanes, USB ports, and supported versions.'},
  {ch:'H1',term:'Form Factor',def:'The physical size standard of a motherboard or case (ATX, mATX, Mini-ITX). Determines compatibility and expansion options.'},
  {ch:'H1',term:'HDD',full:'Hard Disk Drive',def:'A mechanical storage device with large capacity but slower than SSDs. Uses the SATA interface.'},
  {ch:'H1',term:'SSD',full:'Solid State Drive',def:'Faster flash-based storage with no moving parts. Uses the SATA interface.'},
  {ch:'H1',term:'M.2 NVMe',def:'A very fast SSD connected via the PCIe interface with low latency. Small form factor, plugged directly into the motherboard.'},
  {ch:'H1',term:'AHCI',full:'Advanced Host Controller Interface',def:'Communication protocol for SATA drives (HDD and SSD).'},
  {ch:'H1',term:'NVMe',full:'Non-Volatile Memory Express',def:'Communication protocol for M.2 NVMe drives over PCIe. Significantly faster than AHCI.'},
  {ch:'H1',term:'RAID',full:'Redundant Array of Independent Disks',def:'A protocol that combines multiple drives to work together, improving speed or providing data redundancy.'},
  {ch:'H1',term:'RAM',full:'Random Access Memory',def:'The working memory of a computer. Temporarily stores data for active processes. Cleared when the computer is powered off.'},
  {ch:'H1',term:'DDR',full:'Double Data Rate',def:'Generations of RAM (DDR1 through DDR5). Not interchangeable across generations. Newer generations are faster and use lower voltage.'},
  {ch:'H1',term:'Dual / Quad Channel',def:'A memory configuration where multiple RAM modules work together to double or quadruple memory bandwidth.'},
  {ch:'H1',term:'VRAM',full:'Video RAM',def:'Dedicated memory on the graphics card used for temporary storage of image data. Uses GDDR memory.'},
  {ch:'H1',term:'PSU',full:'Power Supply Unit',def:'The power supply of a computer. Converts AC mains power to DC power for components. Capacity measured in Watts.'},
  {ch:'H1',term:'80+ Certification',def:'Efficiency rating for PSUs (Bronze, Gold, Platinum…). Indicates how much of the consumed power is effectively converted into usable power rather than heat.'},
  {ch:'H1',term:'ESD',full:'ElectroStatic Discharge',def:'A static electricity discharge that can damage electronic components. Prevented using an anti-static mat or wrist strap.'},
  {ch:'H1',term:'TRIM',def:'A command the OS sends to an SSD to mark unused blocks, helping maintain write performance over time.'},
  {ch:'H1',term:'Defragmentation',def:'A process for HDDs that reorganises fragmented files so the read/write head travels less. Not needed or suitable for SSDs/NVMe.'},

  // ── CH3 BOOTABLE MEDIA ──
  {ch:'H3',term:'ISO File',def:'An exact copy (image) of a CD or DVD stored as a single file with the .iso extension, conforming to the ISO-9660 standard.'},
  {ch:'H3',term:'Ventoy',def:'A tool that turns a USB stick into a multiboot drive. Multiple ISO files can be copied to the USB and booted from directly.'},
  {ch:'H3',term:'Rufus',def:'A tool for creating a bootable USB from a single ISO file. Also offers options to bypass Windows 11 system requirements.'},
  {ch:'H3',term:'Diskpart',def:'A Windows CLI tool for managing disks and partitions. Key commands: list disk, select disk, clean.'},
  {ch:'H3',term:'Media Creation Tool',def:'A Microsoft utility for downloading a Windows ISO file or creating a bootable USB drive directly.'},
  {ch:'H3',term:'Mounting',def:'Attaching an ISO file in Windows so it appears as a virtual DVD drive in File Explorer.'},
  {ch:'H3',term:'Windows Edition',def:'A variant of Windows tailored for a specific use case: Home (consumer), Pro, Enterprise, Education.'},
  {ch:'H3',term:'Windows Version / Build',def:'A specific release of a Windows edition (e.g. 24H2). Versions add new features and are delivered via Windows Update.'},
  {ch:'H3',term:'32-bit vs 64-bit',def:'32-bit processors can address a maximum of 4 GB RAM (2³²). 64-bit processors can address up to 16 EB (2⁶⁴). A 64-bit system can run 32-bit software, but not vice versa.'},

  // ── CH4 INSTALLATION ──
  {ch:'H4',term:'Clean Install',def:'A fresh installation of Windows that erases all existing programs and data and installs the OS from scratch.'},
  {ch:'H4',term:'Upgrade',def:'An installation that updates the current Windows version to a newer one, preserving existing programs and data.'},
  {ch:'H4',term:'Hostname (Computer Name)',def:'A unique name assigned to a computer on a network. Set during or after the Windows installation process.'},
  {ch:'H4',term:'Driver',def:'Software that enables communication between the operating system and a hardware component. Installed via Windows Update.'},
  {ch:'H4',term:'Regedit',def:'The Windows Registry Editor. Used to view and modify the Windows registry database. Can be used to bypass TPM/Secure Boot checks during installation.'},

  // ── CH5 WINDOWS TOOLS ──
  {ch:'H5',term:'Root Directory',def:'The base directory of a drive, denoted as C:\\. All folders and files on the drive are located beneath it.'},
  {ch:'H5',term:'Program Files',def:'The default installation folder for 64-bit applications. On 64-bit systems, Program Files (x86) holds 32-bit applications.'},
  {ch:'H5',term:'AppData',def:'A hidden per-user folder (Users\\[name]\\AppData) storing application settings and data. Subfolders: Roaming, Local, and LocalLow.'},
  {ch:'H5',term:'.exe File',def:'An executable file that launches a program or application. Can come from any source; requires manual installation.'},
  {ch:'H5',term:'Microsoft Store',def:'Microsoft\'s online app store. Software is vetted by Microsoft and installation is automated.'},
  {ch:'H5',term:'Local User Manager',def:'A Windows tool (lusrmgr.msc) for managing local user accounts and groups.'},
  {ch:'H5',term:'Task Manager',def:'A Windows tool (taskmgr) for monitoring and managing processes, services, CPU/memory usage, and startup programs.'},
  {ch:'H5',term:'Processes',def:'Applications actively launched by the user. Visible in the Processes tab of Task Manager.'},
  {ch:'H5',term:'Services',def:'Programs running in the background, typically belonging to Windows itself or third-party applications.'},
  {ch:'H5',term:'Device Manager',def:'A Windows tool (devmgmt.msc) for viewing and managing drivers and hardware devices. A yellow exclamation mark indicates a missing driver.'},
  {ch:'H5',term:'MMC',full:'Microsoft Management Console',def:'A Windows program for centralising multiple management tools (snap-ins) in one interface.'},
  {ch:'H5',term:'ncpa.cpl',def:'A Windows run command that opens the network adapter settings (connections) directly.'},

  // ── CH6 TERMINAL ──
  {ch:'H6',term:'MS-DOS',full:'Microsoft Disk Operating System',def:'The predecessor to Windows. A text-based OS originally developed for IBM computers. Its command shell (CMD) is still in use today.'},
  {ch:'H6',term:'CMD (Command Prompt)',def:'The Windows Command Line Interface. Supports MS-DOS-style commands. Not case-sensitive.'},
  {ch:'H6',term:'Absolute Path',def:'The full path from the root directory to a file or folder. Example: C:\\CBS\\Win11\\Edu.txt'},
  {ch:'H6',term:'Relative Path',def:'A shortened path relative to the current working directory. Example: .\\file.txt'},
  {ch:'H6',term:'Working Directory',def:'The folder in which the Command Prompt is currently operating. All relative paths start from here.'},
  {ch:'H6',term:'Wildcard (*)',def:'A placeholder character in CMD used to match multiple files or folders by pattern. Example: dir c* lists everything starting with "c".'},
  {ch:'H6',term:'Batch File (.BAT)',def:'A script file with a .bat extension that runs a sequence of CMD commands automatically. Created in a text editor.'},
  {ch:'H6',term:'ECHO',def:'A CMD command that displays text on screen, or toggles whether commands are shown in a script (echo on / echo off).'},
  {ch:'H6',term:'REM',def:'A CMD command used to add comments (remarks) inside a batch file. Lines starting with REM are not executed.'},
  {ch:'H6',term:'PAUSE',def:'A CMD command in a batch file that halts execution and waits for the user to press a key before continuing.'},

  // ── CH7 VIRTUALISATION ──
  {ch:'H7',term:'Virtualisation',def:'Technology that splits one physical system into multiple virtual machines (VMs), each running its own OS. Makes efficient use of hardware resources.'},
  {ch:'H7',term:'Hypervisor (VMM)',full:'Virtual Machine Manager',def:'Software that collects physical resources (CPU, RAM, storage, NIC) and distributes them across virtual machines.'},
  {ch:'H7',term:'Type 1 Hypervisor (Bare Metal)',def:'A hypervisor installed directly on the hardware with no host OS. Has direct access to all hardware. Examples: Hyper-V, VMware ESXi.'},
  {ch:'H7',term:'Type 2 Hypervisor (Hosted)',def:'A hypervisor that runs as an application on top of a host OS. No direct hardware access. Examples: VirtualBox, VMware Workstation.'},
  {ch:'H7',term:'Host OS',def:'The operating system on which a Type 2 hypervisor runs. It manages the physical hardware.'},
  {ch:'H7',term:'Guest OS',def:'The operating system running inside a virtual machine, managed by the hypervisor.'},
  {ch:'H7',term:'VHDX',def:'A virtual hard disk file used by Hyper-V VMs. Stored on the host at C:\\ProgramData\\Microsoft\\Windows\\Virtual Hard Disks\\.'},
  {ch:'H7',term:'Hyper-V',def:'Microsoft\'s Type 1 hypervisor built into Windows. Uses the Virtual Machine Platform feature.'},
  {ch:'H7',term:'Generation 1 (Hyper-V)',def:'A VM generation that uses Legacy BIOS (MBR). Compatible with older operating systems.'},
  {ch:'H7',term:'Generation 2 (Hyper-V)',def:'A VM generation that uses UEFI (GPT). Required for Windows 11. Supports Secure Boot and TPM.'},
  {ch:'H7',term:'Dynamic Memory',def:'A Hyper-V feature that automatically adjusts the amount of RAM allocated to a VM based on its current needs.'},
  {ch:'H7',term:'Default Switch',def:'Automatically created switch in Hyper-V. VMs can reach the LAN, host, internet, and other VMs on the same switch — but not vice versa. Not used in exercises.'},
  {ch:'H7',term:'Private Virtual Switch',def:'VMs on a Private Switch can only communicate with other VMs on the same switch. No host or internet access.'},
  {ch:'H7',term:'Internal Virtual Switch',def:'VMs can communicate with the host and other VMs on the same switch. No internet access.'},
  {ch:'H7',term:'External Virtual Switch',def:'VMs connect via the host\'s physical NIC to the LAN and internet. The NIC is bridged between host and VMs.'},
  {ch:'H7',term:'Checkpoint',def:'A snapshot of a VM\'s state in Hyper-V. Allows the VM to be restored to an earlier point in time.'},

  // ── CH8 WSL ──
  {ch:'H8',term:'WSL',full:'Windows Subsystem for Linux',def:'A Windows feature that allows Linux CLI tools and distributions to run on Windows without a separate virtual machine.'},
  {ch:'H8',term:'WSL 2.0',def:'The second version of WSL. Uses the Virtual Machine Platform for better compatibility and performance. Install with: wsl --install'},
  {ch:'H8',term:'Linux Distro (WSL)',def:'A Linux distribution installable inside WSL (e.g. Ubuntu, Debian). Command: wsl --install -d DistroName'},

  // ── CH9 LINUX ──
  {ch:'H9',term:'Linux',def:'An open-source operating system based on the Linux kernel. Available in hundreds of distributions targeting different audiences and use cases.'},
  {ch:'H9',term:'RHEL Family',def:'The Red Hat Enterprise Linux family (Red Hat, Fedora, CentOS). Uses RPM as its package management system.'},
  {ch:'H9',term:'Debian Family',def:'The Debian Linux family (Ubuntu, Mint, Debian). Uses DEB as its package management system.'},
  {ch:'H9',term:'LTS',full:'Long Term Support',def:'An Ubuntu release with 5 years of guaranteed support. The version number reflects the year and month of release (e.g. 24.04 = April 2024).'},
  {ch:'H9',term:'GRUB',full:'Grand Unified Bootloader',def:'The Linux bootloader that appears at startup, offering the choice of which OS or tool to boot.'},
  {ch:'H9',term:'RPM',full:'Red Hat Package Manager',def:'Package format (.rpm) and management system used by RHEL-based distributions (Fedora, CentOS).'},
  {ch:'H9',term:'DEB',def:'Debian package format (.deb) and management system used by Debian-based distributions (Ubuntu, Mint).'},
  {ch:'H9',term:'apt',def:'Advanced Package Tool. The package manager for Debian-based distros. Key commands: apt update, apt upgrade, apt install, apt remove, apt purge.'},
  {ch:'H9',term:'apt update',def:'Updates the local list of available packages from the repository. Does not install or upgrade any software.'},
  {ch:'H9',term:'apt upgrade',def:'Upgrades all installed packages to their latest available versions from the repository.'},

  {ch:'H9',term:'Software Repository',def:'An online collection of vetted and tested software packages for a specific Linux distribution. Accessed via apt.'},
  {ch:'H9',term:'sudo',full:'SuperUser Do',def:'Executes a single command with root privileges. Prompts for the current user\'s password. Ubuntu remembers it for 5–15 minutes.'},
  {ch:'H9',term:'su',full:'Switch User',def:'Switches to the root user account, including its home directory. Requires the root password.'},
  {ch:'H9',term:'root (Linux)',def:'The superuser with full administrative rights. Disabled by default in Ubuntu. $ = regular user, # = root user.'},
  {ch:'H9',term:'SSH',full:'Secure Shell',def:'A protocol for secure remote connections to other computers or servers. Listens on port 22 by default. Requires an SSH client and an SSH server.'},

  {ch:'H9',term:'Daemon',def:'A background service in Linux, comparable to a Windows service. The "d" in sshd stands for daemon.'},

  {ch:'H9',term:'/ (Root Directory – Linux)',def:'The base directory of the Linux filesystem. All other directories branch from here. Not to be confused with /root (the root user\'s home folder).'},
  {ch:'H9',term:'/etc',def:'Linux directory containing system-wide configuration files, e.g. /etc/passwd (users) and /etc/ssh/sshd_config.'},
  {ch:'H9',term:'/var/log',def:'Linux directory where log files are stored.'},
  {ch:'H9',term:'/home',def:'Linux directory containing the personal folders of regular users (e.g. /home/jan).'},
  {ch:'H9',term:'adduser',def:'A Linux command to create a new user account. Follows interactive prompts for name, password, and other details.'},
];

let activeChapter = 'all';

function setChapter(ch, el) {
  activeChapter = ch;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('searchInput').value = '';
  render();
  if (window.innerWidth <= 700) document.getElementById('sidebar').classList.remove('open');
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  render();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re, '<mark style="background:rgba(79,142,247,0.25);color:inherit;border-radius:2px;padding:0 2px;">$1</mark>');
}

function render() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const content = document.getElementById('content');

  const filtered = TERMS.filter(t => {
    const matchCh = activeChapter === 'all' || t.ch === activeChapter;
    const matchQ = !q || t.term.toLowerCase().includes(q) || t.def.toLowerCase().includes(q) || (t.full && t.full.toLowerCase().includes(q));
    return matchCh && matchQ;
  });

  document.getElementById('statsCount').textContent = filtered.length;

  if (filtered.length === 0) {
    content.innerHTML = `<div class="no-results">
      <div class="no-results-icon">🔍</div>
      <div class="no-results-title">No terms found</div>
      <div class="no-results-sub">Try a different search term or select another chapter.</div>
    </div>`;
    return;
  }

  if (activeChapter !== 'all' || q) {
    const color = activeChapter !== 'all' ? COLORS[activeChapter] : '#8890a8';
    const label = activeChapter !== 'all' ? CHAPTER_NAMES[activeChapter] : 'Search results';
    content.innerHTML = `
      <div class="section-label">
        <span class="section-label-dot" style="background:${color}"></span>
        <span class="section-label-text">${label}</span>
        <span class="section-label-count">${filtered.length} term${filtered.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="terms-grid">${filtered.map(t => cardHTML(t, q)).join('')}</div>`;
  } else {
    const chapters = ['H1','H2','H3','H4','H5','H6','H7','H8','H9'];
    content.innerHTML = chapters.map(ch => {
      const terms = filtered.filter(t => t.ch === ch);
      if (!terms.length) return '';
      return `<div class="section-block">
        <div class="section-label">
          <span class="section-label-dot" style="background:${COLORS[ch]}"></span>
          <span class="section-label-text">${CHAPTER_NAMES[ch]}</span>
          <span class="section-label-count">${terms.length} terms</span>
        </div>
        <div class="terms-grid">${terms.map(t => cardHTML(t, q)).join('')}</div>
      </div>`;
    }).join('');
  }

  updateCounts();
}

function cardHTML(t, q) {
  const color = COLORS[t.ch];
  return `<div class="term-card" onclick="this.classList.toggle('open')">
    <div class="term-header">
      <span class="term-accent" style="background:${color}"></span>
      <span class="term-name">${highlight(t.term, q)}</span>
      ${t.full ? `<span class="abbr-tag">${highlight(t.full, q)}</span>` : ''}
      <span class="chevron-icon">▾</span>
    </div>
    <div class="term-body">${highlight(t.def, q)}</div>
  </div>`;
}

function updateCounts() {
  const chapters = ['H1','H2','H3','H4','H5','H6','H7','H8','H9'];
  document.getElementById('cnt-all').textContent = TERMS.length;
  chapters.forEach(ch => {
    const el = document.getElementById('cnt-' + ch);
    if (el) el.textContent = TERMS.filter(t => t.ch === ch).length;
  });
}

document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== document.getElementById('searchInput')) {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('searchInput').blur();
    document.getElementById('sidebar').classList.remove('open');
  }
});

render();
</script>
</body>
</html>
